<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Block-A-Zoids</title>
    <style>
        /* Reset default body styling and center game content */
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            margin: 0;
            padding: max(6px, env(safe-area-inset-top)) 0 max(6px, env(safe-area-inset-bottom)) 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            position: relative;
            width: 100%;
            min-height: 100%;
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Game container with grid background */
        #gameContainer {
            width: min(600px, calc(100vw - 8px));
            height: min(600px, calc(100vw - 8px));
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            margin-left: 0;
            margin-right: 0;
            --default-glow: 10;
            background-image: linear-gradient(rgba(255, 255, 255, 0.5) 0.67px, transparent 0.67px),
                             linear-gradient(90deg, rgba(255, 255, 255, 0.5) 0.67px, transparent 0.67px);
            background-size: var(--grid-size, 60px) var(--grid-size, 60px);
            background-position: 0 0;
            transition: box-shadow 0.12s linear;
            touch-action: none;
        }
        

        /* Decorative top marquee image */
        #marquee {
            width: min(600px, calc(100vw - 8px));
            margin: 4px 0 8px 0;
            line-height: 0;
        }

        #marquee img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* Player styling as a glowing white circle */
        #player {
            position: absolute;
            background: #fff;
            width: var(--player-size, 20px);
            height: var(--player-size, 20px);
            border-radius: 50%;
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
            border: 1px solid #fff;
            z-index: 3;
            display: none;
        }
        
        /* Enemy styling with dynamic color and glow */
        .enemy {
            position: absolute;
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) currentColor;
            border: 1px solid #fff;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s ease-in, transform 0.3s ease-out;
            --enemy-color: #fff;
        }
        
        /* Explosion effect for player death or bomb detonation */
        .explosion {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 1.2px) #fff;
            opacity: 0;
            transition: all 0.6s ease-out;
            z-index: 6;
        }
        
        /* Base crystal (diamond-shaped) styling */
        .crystal {
            position: absolute;
            width: var(--crystal-size, 10px);
            height: var(--crystal-size, 10px);
            transform: rotate(45deg);
            z-index: 2;
        }
        
        /* Crystal color variants using CSS variables */
        .crystal.red { background-color: var(--red-color); }
        .crystal.green { background-color: var(--green-color); }
        .crystal.blue { background-color: var(--blue-color); }
        
        /* Highlighted crystal with twinkle animation */
        .crystal.next {
            box-shadow: 0 0 25px #FFF, 0 0 40px #FFF, 0 0 60px #FFF;
            animation: twinkle .25s infinite alternate;
            transform: rotate(45deg);
            z-index: 3;
        }
        
        /* Twinkle animation for next crystal */
        @keyframes twinkle {
            0% { background-color: inherit; }
            100% { background-color: rgba(255, 255, 255, 0.7); }
        }
        
        /* Connection lines between collected crystals */
        .connection-line {
            position: absolute;
            background: #fff;
            z-index: 1;
        }
        
        /* Filled square styling for completed grid sections */
        .filled-square {
            position: absolute;
            background: #fff;
            width: var(--grid-size, 60px);
            height: var(--grid-size, 60px);
            z-index: 0;
            opacity: 0.2;
            transition: opacity 0.3s ease;
        }
        
        /* Game over text styling */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(36px, 12vw, 64px);
            font-weight: bold;
            text-shadow: 0 0 calc(var(--default-glow) * 2px) #fff;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            white-space: pre-line;
        }

        /* Bonus text styling for end-of-level reward */
        #bonusText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(30px, 10vw, 48px);
            font-weight: bold;
            text-shadow: 0 0 calc(var(--default-glow) * 1.5px) #fff;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 1001; /* Above game elements, below instructions */
            pointer-events: none;
            text-align: center;
            white-space: pre-line;
        }

        /* Larger level-start countdown text */
        #bonusText.countdownText {
            font-size: clamp(120px, 34vw, 180px);
            opacity: 0.35;
            text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
        }

        /* Flashing one-cell spawn warning shown before a Block-A-Zoid materializes */
        .spawn-warning {
            position: absolute;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.48);
            box-shadow: 0 0 18px #fff, 0 0 36px #fff, inset 0 0 22px rgba(255, 255, 255, 0.7);
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            animation: spawnGridFlash 0.85s steps(1, end) forwards;
        }

        @keyframes spawnGridFlash {
            0% { opacity: 0; }
            10% { opacity: 0.9; }
            22% { opacity: 0; }
            36% { opacity: 0.8; }
            50% { opacity: 0; }
            64% { opacity: 0.95; }
            80% { opacity: 0.15; }
            100% { opacity: 0; }
        }
        
        /* Instructions window for game start */
        #instructionsWindow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(320px, calc(100vw - 64px));
            padding: 14px 12px;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            z-index: 1002;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Instructions title styling */
        #instructionsTitle {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(30px, 10vw, 48px);
            color: #fff;
            text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            margin-bottom: 14px;
        }

        /* Compact instructions text styling */
        #instructionsText {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(11px, 3.2vw, 14px);
            line-height: 1.45;
            color: #fff;
            margin-bottom: 16px;
            text-shadow: 0 0 calc(var(--default-glow) * 0.6px) #fff;
        }

        /* Start button styling */
        #startButton {
            padding: 10px 20px;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 24px;
            color: #fff;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        #startButton:hover {
            background: #fff;
            color: #000;
        }

        /* Full playfield pause/menu overlay */
        #pauseWindow {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: clamp(18px, 5vw, 34px);
            background: rgba(0, 0, 0, 0.94);
            border: none;
            box-shadow: inset 0 0 calc(var(--default-glow) * 1.2px) #fff;
            z-index: 1003;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: clamp(12px, 3vw, 18px);
        }

        #pauseTitle {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(34px, 10vw, 56px);
            color: #fff;
            text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            margin: 0;
        }

        #menuButtons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: min(260px, 78%);
        }

        .menu-button {
            width: 100%;
            padding: 10px 22px;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(17px, 4.8vw, 23px);
            color: #fff;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 0.85px) #fff;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .menu-button:hover {
            background: #fff;
            color: #000;
        }

        .menu-panel {
            display: none;
            width: min(340px, 88%);
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 calc(var(--default-glow) * 0.55px) #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            color: #fff;
            text-shadow: 0 0 calc(var(--default-glow) * 0.45px) #fff;
        }

        .menu-panel.open {
            display: block;
        }

        .menu-panel-title {
            font-size: clamp(15px, 4.4vw, 20px);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .scoring-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: clamp(10px, 2.8vw, 14px);
            line-height: 1.65;
            white-space: nowrap;
        }

        #storyPanelText {
            font-size: clamp(12px, 3.3vw, 15px);
            line-height: 1.5;
            opacity: 0.82;
        }

        .menu-back-button {
            margin-top: 12px;
            padding: 7px 14px;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 14px;
            color: #fff;
            background: #000;
            border: 1px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 0.45px) #fff;
            cursor: pointer;
        }

        .menu-back-button:hover {
            background: #fff;
            color: #000;
        }

        /* Hidden level-select cheat overlay */
        #cheatWindow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(320px, calc(100vw - 60px));
            padding: 16px 14px;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            z-index: 1004;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #cheatTitle {
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: clamp(24px, 7vw, 34px);
            color: #fff;
            text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff;
            margin-bottom: 14px;
        }

        #cheatLevelGrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            margin-bottom: 14px;
        }

        .cheat-level-button,
        #cheatCloseButton {
            padding: 8px 6px;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 16px;
            color: #fff;
            background: #000;
            border: 2px solid #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 0.7px) #fff;
            cursor: pointer;
        }

        .cheat-level-button:hover,
        #cheatCloseButton:hover {
            background: #fff;
            color: #000;
        }
        
        /* Score display styling */
        #score {
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            text-align: center;
            margin: 4px;
            text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff, 0 0 calc(var(--default-glow) * 2px) #fff;
            letter-spacing: 3px;
            font-size: clamp(22px, 7vw, 36px);
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
        }
        
        /* Bottom HUD below the playfield */
        #bottomHud {
            width: min(604px, calc(100vw - 8px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            margin-bottom: 4px;
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
        }

        .hud-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }


        /* Bomb indicators container */
        #bombIndicators {
            display: flex;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
        }
        
        /* Individual bomb missile styling */
        .bomb-missile {
            width: 6px;
            height: 20px;
            background: #fff;
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        
        /* Level indicators container */
        #levelIndicators {
            display: flex;
            gap: 6px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 0 calc(var(--default-glow) * 0.8px) #fff;
        }
        
        /* Level circle styling */
        .level-circle {
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 calc(var(--default-glow) * 0.5px) #fff;
            background: transparent;
        }
        
        .level-circle.completed {
            background: #fff;
        }

        .level-gap {
            margin-left: 12px;
        }
        
        /* Flash animation classes for UI feedback */
        .flash {
            animation: flashAnimation 0.3s 3;
        }
        
        .enemyBorderFlash {
            animation: enemyBorderFlashAnimation 0.3s 1;
        }
        
        .borderFlash {
            animation: borderFlashAnimation 0.5s 1;
        }
        
        /* Flash animation for score or UI elements */
        @keyframes flashAnimation {
            0% { color: #fff; text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff, 0 0 calc(var(--default-glow) * 2px) #fff; }
            50% { color: #fff; text-shadow: 0 0 calc(var(--default-glow) * 1.5px) #fff, 0 0 calc(var(--default-glow) * 3px) #fff; font-size: 40px; }
            100% { color: #fff; text-shadow: 0 0 calc(var(--default-glow) * 1px) #fff, 0 0 calc(var(--default-glow) * 2px) #fff; }
        }
        
        /* Enemy border flash animation for collisions */
        @keyframes enemyBorderFlashAnimation {
            0% { border: 1px solid #fff; box-shadow: 0 0 calc(var(--default-glow) * 0.8px) currentColor; }
            50% { border: 1px solid #fff; box-shadow: 0 0 calc(var(--default-glow) * 2px) #fff; }
            100% { border: 1px solid #fff; box-shadow: 0 0 calc(var(--default-glow) * 0.8px) currentColor; }
        }
        
        /* Container border flash animation */
        @keyframes borderFlashAnimation {
            0% { border-color: #fff; box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff; }
            50% { border-color: #fff; box-shadow: 0 0 calc(var(--default-glow) * 1.5px) #fff; }
            100% { border-color: #fff; box-shadow: 0 0 calc(var(--default-glow) * 1px) #fff; }
        }

        /* Grid fade-in animation for level start */
        @keyframes gridFadeIn {
            0% { background-image: none; opacity: 0; }
            100% { opacity: 1; }
        }

        /* Crystal drop-in animation for level intro */
        @keyframes crystalDrop {
            0% { transform: translateY(-600px) rotate(45deg); opacity: 0; }
            70% { transform: translateY(10px) rotate(45deg); opacity: 1; }
            100% { transform: translateY(0) rotate(45deg); }
        }

        /* Random flashing lights animation for attract mode */
        @keyframes randomFlash {
            0% { background-color: #000; opacity: 0.2; }
            20% { background-color: var(--red-color); opacity: 0.6; }
            40% { background-color: var(--green-color); opacity: 0.6; }
            60% { background-color: var(--blue-color); opacity: 0.6; }
            80% { background-color: #FFF; opacity: 0.8; }
            100% { background-color: #000; opacity: 0.2; }
        }

        /* Screen shake animation for explosions and bomb detonations */
        @keyframes screenShake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5px, 5px); }
            20% { transform: translate(5px, -5px); }
            30% { transform: translate(-5px, 5px); }
            40% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, 5px); }
            60% { transform: translate(5px, -5px); }
            70% { transform: translate(-5px, 5px); }
            80% { transform: translate(5px, -5px); }
            90% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }

        /* Class for attract mode squares with random flashing */
        .attract-square {
            animation: randomFlash 1s infinite;
        }

        /* Class for applying screen shake effect */
        .shake {
            animation: screenShake 0.5s ease-in-out;
        }
        #legalNotice {
            position: fixed;
            bottom: max(3px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: calc(100vw - 16px);
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 0.7px;
            opacity: 0.52;
            text-shadow: 0 0 calc(var(--default-glow) * 0.35px) #fff;
            pointer-events: none;
            z-index: 2000;
            white-space: nowrap;
            text-align: center;
        }

        #buildVersion {
            margin-top: 12px;
            color: #fff;
            font-family: 'Orbitron', 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 0.7px;
            opacity: 0.52;
            text-shadow: 0 0 calc(var(--default-glow) * 0.35px) #fff;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        /* Global CSS variables for RGB colors */
        :root {
            --red-color: #F00;
            --green-color: #0F0;
            --blue-color: #00F;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="marquee">
        <img src="marquee-top.png" alt="Block-A-Zoids marquee">
    </div>

    <!-- Score display -->
    <div id="score">0</div>
    <!-- Main game container -->
    <div id="gameContainer">
        <div id="player"></div>
        <div id="gameOver">GAME OVER</div>
        <div id="bonusText"></div> <!-- New element for bonus display -->
        <div id="instructionsWindow">
            <div id="instructionsText">
                Drag the white orb to move.<br>
                Collect blinking crystals.<br>
                Avoid moving blocks.<br>
                Shake phone for bomb.<br>
                Double tap for menu.
            </div>
            <button id="startButton">Start Game</button>
        </div>
        <div id="pauseWindow">
            <div id="pauseTitle">PAUSED</div>
            <div id="menuButtons">
                <button id="resumeButton" class="menu-button">Resume</button>
                <button id="scoringButton" class="menu-button">Scoring</button>
                <button id="storyButton" class="menu-button">Story</button>
            </div>
            <div id="scoringPanel" class="menu-panel">
                <div class="menu-panel-title">SCORING</div>
                <div class="scoring-row"><span>Crystal</span><span>+10</span></div>
                <div class="scoring-row"><span>Color Group Complete</span><span>+100</span></div>
                <div class="scoring-row"><span>Survival Time</span><span>+1/sec</span></div>
                <div class="scoring-row"><span>Unused Bombs</span><span>+50/ea</span></div>
                <button id="scoringBackButton" class="menu-back-button">Back</button>
            </div>
            <div id="storyPanel" class="menu-panel">
                <div class="menu-panel-title">STORY</div>
                <div id="storyPanelText">Coming soon.</div>
                <button id="storyBackButton" class="menu-back-button">Back</button>
            </div>
            <div id="buildVersion"></div>
        </div>
        <div id="cheatWindow">
            <div id="cheatTitle">LEVEL SELECT</div>
            <div id="cheatLevelGrid"></div>
            <button id="cheatCloseButton">Close</button>
        </div>
    </div>

    <!-- Bottom HUD for laptop testing -->
    <div id="bottomHud">
        <div class="hud-group" id="levelHud">
            <div id="levelIndicators"></div>
        </div>
        <div class="hud-group" id="bombHud">
            <div id="bombIndicators">
                <div class="bomb-missile" id="bomb1"></div>
                <div class="bomb-missile" id="bomb2"></div>
                <div class="bomb-missile" id="bomb3"></div>
            </div>
        </div>
    </div>
    <div id="legalNotice">© 2026 Marcus Couto. All rights reserved.</div>

    <script>
        const BUILD_VERSION = 'Build v32';
        const CHEATS_ENABLED = true;
        document.getElementById('buildVersion').textContent = BUILD_VERSION;

        // Main game class managing state and logic
        class Game {
            constructor() {
                // Define RGB color constants for consistency across the game
                this.RED_COLOR = '#F00';    // Red color constant
                this.GREEN_COLOR = '#0F0';  // Green color constant
                this.BLUE_COLOR = '#00F';   // Blue color constant

                // Game parameters configuration
                this.parameters = {
                    playfieldSize: 600,         // Size of the playfield (600x600px)
                    playerSize: 20,            // Player square size
                    minSpawnDistance: 325,     // Minimum spawn distance from player
                    baseSpawnRate: 5,          // Base enemy spawn rate (seconds)
                    spawnRateLevelReduction: 0.25, // Spawn timer reduction per level; smaller = slower difficulty ramp
                    baseMaxEnemies: 12,        // Constant maximum number of enemies on screen
                    maxEnemyCap: 12,           // Hard cap for enemies on screen
                    baseSpeeds: { small: 3, medium: 2, large: 1.5 }, // Base speeds for enemy sizes
                    baseBombs: 3,              // Starting number of bombs
                    unusedBombBonus: 50,       // End-of-level bonus for each unused bomb
                    colorCompleteBonus: 100,   // Bonus for clearing all crystals in one color group
                    levelSpeedBoost: 0.03      // Enemy speed increase per level; each bomb adds one temporary level-speed notch
                };

                // Enemy spawn proportions
                this.SMALL_SPAWN_PROPORTION = 1 / 3;  // 4 of 12 enemies
                this.MEDIUM_SPAWN_PROPORTION = 0.50; // 6 of 12 enemies
                this.LARGE_SPAWN_PROPORTION = 1 / 6;  // 2 of 12 enemies

                // DOM element references
                this.container = document.getElementById('gameContainer');
                this.gameOverElement = document.getElementById('gameOver');
                this.bonusTextElement = document.getElementById('bonusText'); // New reference for bonus text

                this.menuButtons = document.getElementById('menuButtons');
                this.cheatWindow = document.getElementById('cheatWindow');
                this.cheatLevelGrid = document.getElementById('cheatLevelGrid');
                this.cheatCloseButton = document.getElementById('cheatCloseButton');

                // Game constants derived from the actual iPhone-sized board.
                this.configureResponsivePlayfield();
                this.spawnRate = this.parameters.baseSpawnRate;
                this.MAX_ENEMIES = this.parameters.maxEnemyCap;
                this.TOTAL_CRYSTALS = 80; // Total crystals per level
                this.MAX_LEVEL = 13; // Touch test campaign length
                this.BASE_BLINKING_CRYSTAL_COUNT = 5; // Each level starts with five blinking crystal choices
                this.currentBlinkingCrystalCount = this.BASE_BLINKING_CRYSTAL_COUNT; // Bomb use lowers this for the current level only

                // Game objects and state
                this.player = new Player(this);       // Player instance
                this.enemies = [];                    // Array of active enemies
                this.explosions = [];                 // Array of active explosions
                this.crystals = [];                   // Array of collectible crystals
                this.collectedPositions = [];         // Positions of collected crystals
                this.lines = [];                      // Connection lines between crystals
                this.attractSquares = [];             // Squares for attract mode
                this.level = 1;                       // Current level
                this.score = 0;                       // Player score
                this.bombsLeft = this.parameters.baseBombs; // Remaining bombs
                this.bombPressure = 0;                // Extra danger added by bomb use during the current level
                this.active = false;                  // Game active state
                this.waitingForPlayerMove = false;    // Level is displayed but enemy action waits for first movement
                this.levelActionStarted = false;      // Enemy spawning/game loop has started for the current level
                this.isPaused = false;                // Temporary pause-screen state
                this.updateGameTimer = null;          // Enemy spawn timer so pause/resume cannot duplicate spawn loops
                this.gameplayRunToken = 0;            // Invalidates old animation frames when pausing/restarting
                this.pauseTapStart = null;            // Manual double-tap/click pause detector start point
                this.lastPauseTapTime = 0;            // Previous quick tap/click used for pause detection
                this.pauseDoubleTapWindowMs = 430;    // Maximum time between two quick taps/clicks for pause
                this.pauseTapMaxDurationMs = 320;     // Single tap must be quick enough to count toward pause
                this.pauseTapMaxMove = Math.max(22, this.PLAYER_SIZE * 1.4); // Ignore drags as pause taps
                this.lastBombTriggerTime = 0;         // Prevents repeated bomb triggers from one input
                this.bombInputCooldownMs = 450;
                this.motionBombEnabled = false;       // True after iOS/device motion permission is granted
                this.lastShakeBombTime = 0;           // Prevents one shake from firing multiple bombs
                this.shakeBombCooldownMs = 1200;
                this.shakeThreshold = 32;             // Higher = harder to trigger accidentally
                this.lastMotionSample = null;
                this.wakeLock = null;                 // Optional screen wake lock during active play
                this.isGameOver = false;              // Game over state
                this.spawnCounter = 0;                // Counter for enemy spawning
                this.lastFrameTime = performance.now(); // Last frame timestamp
                this.currentColorIndex = 0;           // Index of current crystal color
                this.nextCrystalOrder = 1;            // Current blinking crystal order marker
                this.activeBlinkingCrystals = [];     // Current selectable blinking crystals; kept stable between pickups
                this.survivalScoreAccumulator = 0;   // Tracks active gameplay seconds for +1 point per second
                this.lastCollectedPos = null;         // Last collected crystal position
                this.colorOrder = ['red', 'green', 'blue']; // Order of crystal colors
                this.colorMap = { 
                    red: this.RED_COLOR, 
                    green: this.GREEN_COLOR, 
                    blue: this.BLUE_COLOR 
                }; // Map of colors to hex values

                // Enemy spawn management
                this.spawnQueue = [];                 // Queue of enemies to spawn
                this.spawnedCount = { small: 0, medium: 0, large: 0 }; // Count of spawned enemies by size
                this.pendingSpawnWarnings = [];      // Telegraphs queued before enemies materialize
                this.spawnWarningDurationMs = 850;    // How long the warning flashes before spawn

                // Audio and UI managers
                this.audio = new AudioManager();      // Audio manager instance
                this.ui = new UI(this);               // UI manager instance

                // Event handlers for player input
                this.handleMouseMove = (e) => this.player.handleMouseMove(e);
                this.handlePointerDown = (e) => this.player.handlePointerDown(e);
                this.handlePointerMove = (e) => this.player.handlePointerMove(e);
                this.handlePointerUp = (e) => this.player.handlePointerUp(e);
                this.handleKeyDown = (e) => {
                    if (e.shiftKey && e.code === 'ArrowUp') {
                        e.preventDefault();
                        this.jumpToLevel(this.level + 1);
                        return;
                    }

                    if (e.shiftKey && e.code === 'ArrowDown') {
                        e.preventDefault();
                        this.jumpToLevel(this.level - 1);
                        return;
                    }

                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.handleBomb();
                    }
                };
                this.handleDeviceMotion = (e) => this.handleShakeMotion(e);
                this.handlePausePointerDown = (e) => this.recordPausePointerDown(e);
                this.handlePausePointerUp = (e) => this.recordPausePointerUp(e);
                this.handlePausePointerCancel = () => { this.pauseTapStart = null; };
                this.container.addEventListener('mousemove', this.handleMouseMove);
                this.container.addEventListener('pointerdown', this.handlePointerDown, { passive: false });
                this.container.addEventListener('pointermove', this.handlePointerMove, { passive: false });
                this.container.addEventListener('pointerup', this.handlePointerUp, { passive: false });
                this.container.addEventListener('pointercancel', this.handlePointerUp, { passive: false });
                this.container.addEventListener('pointerdown', this.handlePausePointerDown, { passive: true });
                this.container.addEventListener('pointerup', this.handlePausePointerUp, { passive: false });
                this.container.addEventListener('pointercancel', this.handlePausePointerCancel, { passive: true });
                document.addEventListener('keydown', this.handleKeyDown);
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible' && this.active && !this.isPaused && !this.isGameOver) {
                        this.requestWakeLock();
                    }
                });
                this.startButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.enableShakeBomb();

                });
                this.resumeButton.addEventListener('click', (e) => {

                });
                this.resumeButton.addEventListener('dblclick', (e) => {

                });

                });
                this.storyButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    this.showMenuPanel('story');
                });
                this.scoringBackButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                });
                this.storyBackButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    this.showMainMenuButtons();
                });
                this.cheatCloseButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    this.hideCheatMenu();
                });
                this.pauseWindow.addEventListener('pointerup', (e) => this.handleCheatPauseTap(e), { passive: false });
                this.buildCheatLevelButtons();

                // Attract mode variables
                this.attractInterval = null;          // Interval ID for attract mode
                this.lifeGrid = [];                   // 10x10 grid for Game of Life
                this.levelLoadToken = 0;             // Cancels older intro/level-start timers during test jumps
                this.cheatPreviewMode = false;       // Temporary testing mode: level jumps show patterns without enemies
                this.cheatTapCount = 0;              // Hidden mobile level-select trigger
                this.lastCheatTapTime = 0;
                this.cheatTapWindowMs = 700;

                // Initialize level parameters and start attract mode
                this.applyLevelParameters();
                this.startAttractMode();
            }

            // Size the board directly for iPhone instead of clipping or transform-scaling a 600px board.
            configureResponsivePlayfield() {
                const availableWidth = Math.max(300, Math.min(600, window.innerWidth - 8));
                const availableHeight = Math.max(300, Math.min(600, window.innerHeight - 118));
                const boardSize = Math.max(300, Math.floor(Math.min(availableWidth, availableHeight) / 10) * 10);
                const scale = boardSize / this.parameters.playfieldSize;

                this.PLAYFIELD_SIZE = boardSize;
                this.GRID_SIZE = boardSize / 10;
                this.SIZE_SCALE = scale;
                this.PLAYER_SIZE = Math.max(18, Math.round(this.parameters.playerSize * scale));
                this.CRYSTAL_SIZE = Math.max(8, Math.round(10 * scale));
                this.CRYSTAL_OFFSET = this.CRYSTAL_SIZE / 2;
                this.MIN_SPAWN_DISTANCE = Math.round(this.parameters.minSpawnDistance * scale);
                this.BASE_SPEEDS = {
                    small: this.parameters.baseSpeeds.small * scale,
                    medium: this.parameters.baseSpeeds.medium * scale,
                    large: this.parameters.baseSpeeds.large * scale
                };

                this.container.style.width = `${boardSize}px`;
                this.container.style.height = `${boardSize}px`;
                document.documentElement.style.setProperty('--grid-size', `${this.GRID_SIZE}px`);
                document.documentElement.style.setProperty('--player-size', `${this.PLAYER_SIZE}px`);
                document.documentElement.style.setProperty('--crystal-size', `${this.CRYSTAL_SIZE}px`);
            }

            // Adjust spawn rate by level; enemy count stays capped at a constant value. Bomb pressure only affects speed.
            applyLevelParameters() {
                this.spawnRate = Math.max(2, this.parameters.baseSpawnRate - (this.level - 1) * this.parameters.spawnRateLevelReduction);
                this.MAX_ENEMIES = this.parameters.maxEnemyCap;

                const totalEnemies = this.MAX_ENEMIES;
                const smallCount = Math.round(totalEnemies * this.SMALL_SPAWN_PROPORTION);
                const mediumCount = Math.round(totalEnemies * this.MEDIUM_SPAWN_PROPORTION);
                const largeCount = Math.round(totalEnemies * this.LARGE_SPAWN_PROPORTION);

                let currentTotal = smallCount + mediumCount + largeCount;
                let adjustedSmall = smallCount;
                let adjustedMedium = mediumCount;
                let adjustedLarge = largeCount;

                // Adjust counts to match total enemies
                while (currentTotal < totalEnemies) {
                    if (adjustedMedium < Math.round(totalEnemies * this.MEDIUM_SPAWN_PROPORTION + 1)) adjustedMedium++;
                    else if (adjustedSmall < Math.round(totalEnemies * this.SMALL_SPAWN_PROPORTION + 1)) adjustedSmall++;
                    else adjustedLarge++;
                    currentTotal = adjustedSmall + adjustedMedium + adjustedLarge;
                }
                while (currentTotal > totalEnemies) {
                    if (adjustedLarge > Math.round(totalEnemies * this.LARGE_SPAWN_PROPORTION - 1)) adjustedLarge--;
                    else if (adjustedSmall > Math.round(totalEnemies * this.SMALL_SPAWN_PROPORTION - 1)) adjustedSmall--;
                    else adjustedMedium--;
                    currentTotal = adjustedSmall + adjustedMedium + adjustedLarge;
                }

                // Populate spawn queue with adjusted counts
                this.spawnQueue = [];
                for (let i = 0; i < adjustedSmall; i++) this.spawnQueue.push('small');
                for (let i = 0; i < adjustedMedium; i++) this.spawnQueue.push('medium');
                for (let i = 0; i < adjustedLarge; i++) this.spawnQueue.push('large');

                // Shuffle spawn queue for randomness
                for (let i = this.spawnQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.spawnQueue[i], this.spawnQueue[j]] = [this.spawnQueue[j], this.spawnQueue[i]];
                }
            }

            // Enemy speed uses one named tuning constant.
            // Each bomb adds one temporary level-speed notch for the current level only.
            getEnemySpeed(type) {
                const levelBoost = (this.level - 1) * this.parameters.levelSpeedBoost;
                const bombBoost = this.bombPressure * this.parameters.levelSpeedBoost;
                const multiplier = 1 + levelBoost + bombBoost;
                return this.BASE_SPEEDS[type] * multiplier;
            }
            // Try to keep the screen awake during active gameplay.
            async requestWakeLock() {
                if (typeof navigator === 'undefined' || !('wakeLock' in navigator) || !navigator.wakeLock.request || this.wakeLock) return;
                try {
                    this.wakeLock = await navigator.wakeLock.request('screen');
                    this.wakeLock.addEventListener('release', () => {
                        this.wakeLock = null;
                    });
                } catch (_) {
                    // Unsupported or denied wake locks simply fall back to normal screen behavior.
                }
            }

            async releaseWakeLock() {
                if (!this.wakeLock) return;
                const lock = this.wakeLock;
                this.wakeLock = null;
                try {
                    await lock.release();
                } catch (_) {
                    // Already released or unsupported.
                }
            }

            // Remove active gameplay objects before starting, jumping, or rebuilding a level.
            clearGameplayObjects() {
                this.clearPendingSpawnWarnings();

                this.enemies.forEach(enemy => enemy.element.remove());
                this.enemies = [];

                this.explosions.forEach(exp => exp.element.remove());
                this.explosions = [];

                this.crystals.forEach(crys => crys.element.remove());
                this.crystals = [];

                this.collectedPositions = [];

                this.lines.forEach(line => line.element.remove());
                this.lines = [];

                const filledSquares = this.container.getElementsByClassName('filled-square');
                while (filledSquares.length > 0) filledSquares[0].remove();
            }

            // Stop any scheduled enemy-spawn update so pause/restart cannot create stacked timers.
            clearUpdateGameTimer() {
                if (this.updateGameTimer) {
                    clearTimeout(this.updateGameTimer);
                    this.updateGameTimer = null;
                }
            }

            // Reset state shared by a fresh level start or a testing jump.
            prepareLevelStart(levelNumber, resetScore = false) {
                this.active = false;
                this.waitingForPlayerMove = false;
                this.levelActionStarted = false;
                this.isPaused = false;
                this.gameplayRunToken++;
                this.clearUpdateGameTimer();
                this.releaseWakeLock();
                this.isGameOver = false;
                this.instructionsWindow.style.display = 'none';
                this.pauseWindow.style.display = 'none';
                if (this.menuButtons && this.scoringPanel && this.storyPanel) this.showMainMenuButtons();
                this.cheatWindow.style.display = 'none';
                this.gameOverElement.style.opacity = '0';
                this.bonusTextElement.classList.remove('countdownText');
                this.bonusTextElement.style.opacity = '0';
                this.stopAttractMode();
                this.clearGameplayObjects();
                this.player.reset();

                this.level = Math.max(1, Math.min(this.MAX_LEVEL, levelNumber));
                if (resetScore) {
                    this.score = 0;
                }
                this.bombsLeft = this.parameters.baseBombs;
                this.currentBlinkingCrystalCount = this.BASE_BLINKING_CRYSTAL_COUNT;
                this.bombPressure = 0;
                this.spawnCounter = 0;
                this.lastFrameTime = performance.now();
                this.spawnedCount = { small: 0, medium: 0, large: 0 };
                this.currentColorIndex = 0;
                this.nextCrystalOrder = 1;
                this.activeBlinkingCrystals = [];
                this.survivalScoreAccumulator = 0;
                this.lastCollectedPos = null;
                this.applyLevelParameters();
                this.ui.updateAll();
            }

            // Start the current prepared level after the grid appears and a 3-second countdown finishes.
            startPreparedLevel(loadToken) {
                this.runIntroAnimation()
                    .then(() => this.runLevelCountdown(loadToken))
                    .then((countdownCompleted) => {
                        if (!countdownCompleted || loadToken !== this.levelLoadToken) return;

                        this.active = true;
                        this.waitingForPlayerMove = false;
                        this.levelActionStarted = false;
                        this.lastFrameTime = performance.now();
                        this.updateCrystalHighlight();
                        this.updateEnemyColors();
                        this.gameOverElement.style.opacity = '0';
                        this.bonusTextElement.style.opacity = '0';
                        this.startButton.textContent = 'Start Game';
                        this.ui.updateAll();
                        this.beginLevelAction();
                    });
            }

            // Show the level grid first, then count down 3-2-1-GO before live action begins.
            async runLevelCountdown(loadToken) {
                const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
                const steps = ['3', '2', '1'];

                this.bonusTextElement.classList.add('countdownText');
                this.bonusTextElement.style.transition = 'opacity 0.12s ease-in-out';
                this.bonusTextElement.style.opacity = '0.35';

                const cancelCountdown = () => {
                    this.bonusTextElement.classList.remove('countdownText');
                    this.bonusTextElement.style.opacity = '0';
                    return false;
                };

                for (const step of steps) {
                    if (loadToken !== this.levelLoadToken) return cancelCountdown();
                    this.bonusTextElement.textContent = step;
                    this.audio.playCountdownBeep(false);
                    await wait(1000);
                }

                if (loadToken !== this.levelLoadToken) return cancelCountdown();
                this.bonusTextElement.textContent = 'GO';
                this.audio.playCountdownBeep(true);
                await wait(300);
                this.bonusTextElement.style.opacity = '0';
                await wait(150);
                this.bonusTextElement.classList.remove('countdownText');
                return loadToken === this.levelLoadToken;
            }

            // Begin enemy spawning, music, and collision updates after the countdown finishes.
            beginLevelAction() {
                if (!this.active || this.isGameOver || this.isPaused || this.levelActionStarted) return;

                this.waitingForPlayerMove = false;
                this.levelActionStarted = true;
                this.lastFrameTime = performance.now();
                this.gameplayRunToken++;
                const runToken = this.gameplayRunToken;
                this.clearUpdateGameTimer();
                this.audio.startBackgroundMusic();
                this.requestWakeLock();
                requestAnimationFrame((timestamp) => this.gameLoop(timestamp, runToken));
                this.updateGame();
            }

            // Manual double-tap/click detector. Native dblclick is unreliable on iPhone with pointer controls.
            showMainMenuButtons() {
                this.menuButtons.style.display = 'flex';
                this.scoringPanel.classList.remove('open');
                this.storyPanel.classList.remove('open');
            }

            showMenuPanel(panelName) {
                this.menuButtons.style.display = 'none';
                this.scoringPanel.classList.toggle('open', panelName === 'scoring');
                this.storyPanel.classList.toggle('open', panelName === 'story');
            }

            // Build the hidden level-select buttons once.
            buildCheatLevelButtons() {
                this.cheatLevelGrid.innerHTML = '';
                for (let levelNumber = 1; levelNumber <= this.MAX_LEVEL; levelNumber++) {
                    const button = document.createElement('button');
                    button.className = 'cheat-level-button';
                    button.textContent = `${levelNumber}`;
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.hideCheatMenu();
                        this.jumpToLevel(levelNumber, true);
                    });
                    this.cheatLevelGrid.appendChild(button);
                }
            }

            // Tap anywhere on the pause/menu window five times quickly to reveal level select.
            handleCheatPauseTap(e) {
                if (!CHEATS_ENABLED || !this.isPaused) return;
                if (e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                const now = performance.now();
                if (now - this.lastCheatTapTime > this.cheatTapWindowMs) {
                    this.cheatTapCount = 0;
                }

                this.lastCheatTapTime = now;
                this.cheatTapCount++;

                if (this.cheatTapCount >= 5) {
                    this.cheatTapCount = 0;
                    this.showCheatMenu();
                }
            }

            showCheatMenu() {
                if (!CHEATS_ENABLED) return;
                this.audio.playCheatUnlock();
                this.cheatWindow.style.display = 'flex';
            }

            hideCheatMenu() {
                this.cheatWindow.style.display = 'none';
            }

            shouldIgnorePausePointerEvent(e) {
                if (!e || !e.target) return false;
                if (e.target.closest && e.target.closest('#pauseWindow')) return true;
                if (e.target.closest && e.target.closest('#cheatWindow')) return true;
                if (e.target.closest && e.target.closest('#instructionsWindow')) return true;
                return false;
            }

            recordPausePointerDown(e) {
                if (this.shouldIgnorePausePointerEvent(e)) return;
                if (!this.active || this.isPaused || this.isGameOver || !this.levelActionStarted) return;

                this.pauseTapStart = {
                    pointerId: e.pointerId,
                    x: e.clientX,
                    y: e.clientY,
                    time: performance.now()
                };
            }

            recordPausePointerUp(e) {
                if (this.shouldIgnorePausePointerEvent(e)) return;
                if (!this.active || this.isPaused || this.isGameOver || !this.levelActionStarted || !this.pauseTapStart) return;
                if (e.pointerId !== this.pauseTapStart.pointerId) return;

                const now = performance.now();
                const duration = now - this.pauseTapStart.time;
                const distance = Math.hypot(e.clientX - this.pauseTapStart.x, e.clientY - this.pauseTapStart.y);
                this.pauseTapStart = null;

                if (duration > this.pauseTapMaxDurationMs || distance > this.pauseTapMaxMove) return;

                const sinceLastTap = now - this.lastPauseTapTime;
                if (sinceLastTap > 0 && sinceLastTap <= this.pauseDoubleTapWindowMs) {
                    this.lastPauseTapTime = 0;
                    if (e.preventDefault) e.preventDefault();
                    if (e.stopPropagation) e.stopPropagation();
                    this.pauseGame();
                    return;
                }

                this.lastPauseTapTime = now;
            }

            pauseGame() {
                if (!this.active || this.isGameOver || !this.levelActionStarted || this.isPaused) return;

                this.isPaused = true;
                this.active = false;
                this.pauseTapStart = null;
                this.lastPauseTapTime = 0;
                this.cheatTapCount = 0;
                this.lastCheatTapTime = 0;
                this.gameplayRunToken++;
                this.clearUpdateGameTimer();
                this.clearPendingSpawnWarnings(true);
                this.audio.stopBackgroundMusic();
                this.releaseWakeLock();
                this.showMainMenuButtons();
                this.pauseWindow.style.display = 'flex';
            }

            resumeGame() {
                if (!this.isPaused || this.isGameOver) return;

                this.isPaused = false;
                this.active = true;
                this.pauseWindow.style.display = 'none';
                if (this.menuButtons && this.scoringPanel && this.storyPanel) this.showMainMenuButtons();
                this.cheatWindow.style.display = 'none';
                this.lastFrameTime = performance.now();
                this.gameplayRunToken++;
                const runToken = this.gameplayRunToken;
                this.clearUpdateGameTimer();
                this.audio.startBackgroundMusic();
                this.requestWakeLock();
                requestAnimationFrame((timestamp) => this.gameLoop(timestamp, runToken));
                this.updateGame();
            }

            // Testing shortcut: Shift + Up / Down moves one level at a time.
            jumpToLevel(levelNumber, resetScore = true) {
                const targetLevel = Math.max(1, Math.min(this.MAX_LEVEL, levelNumber));
                const loadToken = ++this.levelLoadToken;

                this.cheatPreviewMode = false;
                this.audio.resume();
                this.audio.stopBackgroundMusic();
                this.prepareLevelStart(targetLevel, resetScore);
                this.showLevelJumpText(targetLevel);
                this.startPreparedLevel(loadToken);
            }

            // Brief visual confirmation when using testing shortcuts.
            showLevelJumpText(levelNumber) {
                // Cheat jumps should not display level numbers or names.
                this.bonusTextElement.textContent = '';
                this.bonusTextElement.style.opacity = '0';
            }

            // Start a new game
            start() {
                const loadToken = ++this.levelLoadToken;

                this.cheatPreviewMode = false; // Normal game start uses enemies
                this.audio.resume(); // Unlock audio after the player's start click
                this.audio.stopBackgroundMusic(); // Stop any background music
                this.prepareLevelStart(1, true); // Reset to level 1 with a fresh score
                this.startPreparedLevel(loadToken);
            }
            // Restore the arcade crystal-drop intro before the countdown begins.
            async runIntroAnimation() {
                this.player.reset(); // Center player
                this.container.style.animation = 'gridFadeIn 1s ease-in forwards';
                await new Promise(resolve => setTimeout(resolve, 1000));
                this.container.style.animation = '';

                this.audio.playIntro(); // Retro arpeggio plays with the crystal drop
                this.spawnCrystals(true); // Crystals fall into place before the countdown
                await new Promise(resolve => setTimeout(resolve, 2000));
            }

            // Simple seeded random generator so each level has a stable-but-different layout.
            createSeededRandom(seed) {
                let state = seed % 2147483647;
                if (state <= 0) state += 2147483646;
                return () => {
                    state = state * 16807 % 2147483647;
                    return (state - 1) / 2147483646;
                };
            }

            // Human-readable names for testing feedback.
            getLevelPatternName(levelNumber = this.level) {
                const names = [
                    'Columns',
                    '3x3 Blocks',
                    'Horizontal Rows',
                    'Vertical Rows',
                    'Concentric Squares',
                    'Reverse Diagonals',
                    'Diagonals',
                    'Diamond Rings',
                    'Cross Quadrants',
                    'Tilted Quadrants',
                    'Mathematical Dispersion',
                    'Confetti',
                    'Imbalance'
                ];
                return names[Math.max(0, Math.min(this.MAX_LEVEL - 1, levelNumber - 1))];
            }

            // Every level uses the same red -> green -> blue collection rule.
            // Levels 1 and 2 are fixed. The later levels are visual motif boards for selection testing.
            // Difficulty can later be adjusted with enemy count, enemy speed, spawn timing, and bomb pressure.
            getLevelPatternRows(levelNumber = this.level) {
                const patterns = [
                    // Level 1 — Columns: final tutorial pattern with large, easy color zones.
                    [
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB'
                    ],
                    // Level 2 — 3x3 Blocks: final 3-by-3 square grid.
                    [
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'RRRGGGBBB',
                        'GGGBBBRRR',
                        'GGGBBBRRR',
                        'GGGBBBRRR',
                        'BBBRRRGGG',
                        'BBBRRRGGG',
                        'BBBRRRGGG'
                    ],
                    // Level 3 — Horizontal Rows: single-color rows alternating red, green, blue.
                    [
                        'RRRRRRRRR',
                        'GGGGGGGGG',
                        'BBBBBBBBB',
                        'RRRRRRRRR',
                        'GGGGGGGGG',
                        'BBBBBBBBB',
                        'RRRRRRRRR',
                        'GGGGGGGGG',
                        'BBBBBBBBB'
                    ],
                    // Level 4 — Vertical Rows: single-color columns alternating red, green, blue.
                    [
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB',
                        'RGBRGBRGB'
                    ],
                    // Level 5 — Concentric Squares: thin square rings.
                    [
                        'RRRRRRRRR',
                        'RGGGGGGGR',
                        'RGBBBBBGR',
                        'RGBRRRBGR',
                        'RGBRGRBGR',
                        'RGBRRRBGR',
                        'RGBBBBBGR',
                        'RGGGGGGGR',
                        'RRRRRRRRR'
                    ],
                    // Level 6 — Reverse Diagonals: the same diagonal idea slanting the opposite direction.
                    [
                        'RGBRGBRGB',
                        'GBRGBRGBR',
                        'BRGBRGBRG',
                        'RGBRGBRGB',
                        'GBRGBRGBR',
                        'BRGBRGBRG',
                        'RGBRGBRGB',
                        'GBRGBRGBR',
                        'BRGBRGBRG'
                    ],
                    // Level 7 — Diagonals: clean diagonal bands slanting one direction.
                    [
                        'RGBRGBRGB',
                        'BRGBRGBRG',
                        'GBRGBRGBR',
                        'RGBRGBRGB',
                        'BRGBRGBRG',
                        'GBRGBRGBR',
                        'RGBRGBRGB',
                        'BRGBRGBRG',
                        'GBRGBRGBR'
                    ],
                    // Level 8 — Diamond Rings: thin diamond-shaped rings.
                    [
                        'BGRBGBRGB',
                        'GRBGRGBRG',
                        'RBGRBRGBR',
                        'BGRBGBRGB',
                        'GRBGRGBRG',
                        'BGRBGBRGB',
                        'RBGRBRGBR',
                        'GRBGRGBRG',
                        'BGRBGBRGB'
                    ],
                    // Level 9 — Cross Quadrants: central cross, with nested squares in each quadrant.
                    [
                        'RRRRGBBBB',
                        'RGGRGBGGB',
                        'RGGRGBGGB',
                        'RRRRGBBBB',
                        'GGGGGGGGG',
                        'BBBBGRRRR',
                        'BGGBGRGGR',
                        'BGGBGRGGR',
                        'BBBBGRRRR'
                    ],
                    // Level 10 — Tilted Quadrants: the quadrant/nested-square idea rotated 45 degrees.
                    [
                        'GRRBBBRRG',
                        'BGRRBRRGB',
                        'BBGRRRGBB',
                        'RBBGRGBBR',
                        'RRBBGBBRR',
                        'RBBGRGBBR',
                        'BBGRRRGBB',
                        'BGRRBRRGB',
                        'GRRBBBRRG'
                    ],
                    // Level 11 — Mathematical Dispersion: controlled RGB scatter with no big clumps.
                    [
                        'RGBGRGBRB',
                        'GBRBGBRGR',
                        'BRGRBRGBG',
                        'GBRBGBRGR',
                        'BRGRBRGBG',
                        'RGBGRGBRB',
                        'BRGRBRGBG',
                        'RGBGRGBRB',
                        'GBRBGBRGR'
                    ],
                    // Level 12 — Confetti: final mixed board.
                    [
                        'RBGGRRGBR',
                        'BRRBGGBRG',
                        'GBRBGRRGB',
                        'RRGBBGGBR',
                        'GBRBRGRRG',
                        'BGGRBRRBG',
                        'RGBBRRGBG',
                        'BRGBGGRRB',
                        'RRGBGRBGR'
                    ],
                    // Level 13 — Imbalance: intentionally asymmetric and uneven in both counts and placement.
                    [
                        'RRRRRRRRG',
                        'RGRRRRRGG',
                        'RRRGRRGGG',
                        'RRBRRGGGB',
                        'RRRRGGGBB',
                        'RRRGGGRRB',
                        'RRGGGBRRB',
                        'RGGGBBBBB',
                        'GBBBBBBBB'
                    ]
                ];

                return patterns[Math.max(0, Math.min(patterns.length - 1, levelNumber - 1))];
            }

            // Return a crystal color for a grid cell.
            getCrystalColorForLevelPattern(col, row) {
                const rows = this.getLevelPatternRows(this.level);
                const letter = rows[row - 1][col - 1];
                if (letter === 'R') return 'red';
                if (letter === 'G') return 'green';
                return 'blue';
            }

            // Assign order numbers inside each color.
            // For pattern-selection testing, the route only needs to feel reasonable, not final.
            assignCrystalOrders(cells) {
                const sortAndNumber = (color, compareFn) => {
                    cells
                        .filter(cell => cell.color === color)
                        .sort(compareFn)
                        .forEach((cell, index) => {
                            cell.order = index + 1;
                        });
                };

                const snakeColumnValue = (cell) => cell.row % 2 === 0 ? 10 - cell.col : cell.col;
                const squareRingIndex = (cell) => Math.max(Math.abs(cell.col - 5), Math.abs(cell.row - 5));
                const diamondRingIndex = (cell) => Math.abs(cell.col - 5) + Math.abs(cell.row - 5);
                const radialDistance = (cell) => Math.hypot(cell.col - 5, cell.row - 5);
                const angleFromCenter = (cell) => Math.atan2(cell.row - 5, cell.col - 5);
                const spiralRank = (cell) => this.getSpiralRank(cell.col, cell.row);

                if (this.level === 1) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => a.col - b.col || a.row - b.row);
                    });
                    return;
                }

                if (this.level === 2 || this.level === 3 || this.level === 9 || this.level === 10 || this.level === 11 || this.level === 13) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => a.row - b.row || snakeColumnValue(a) - snakeColumnValue(b));
                    });
                    return;
                }

                if (this.level === 4) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => a.col - b.col || a.row - b.row);
                    });
                    return;
                }

                if (this.level === 5) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => {
                            const diagonalCompare = (a.col + a.row) - (b.col + b.row);
                            if (diagonalCompare !== 0) return diagonalCompare;
                            return a.row - b.row || a.col - b.col;
                        });
                    });
                    return;
                }

                if (this.level === 6) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => {
                            const diagonalCompare = (a.col - a.row) - (b.col - b.row);
                            if (diagonalCompare !== 0) return diagonalCompare;
                            return a.row - b.row || a.col - b.col;
                        });
                    });
                    return;
                }

                if (this.level === 7) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => {
                            const ringCompare = squareRingIndex(b) - squareRingIndex(a);
                            if (ringCompare !== 0) return ringCompare;
                            return angleFromCenter(a) - angleFromCenter(b);
                        });
                    });
                    return;
                }

                if (this.level === 8) {
                    this.colorOrder.forEach(color => {
                        sortAndNumber(color, (a, b) => {
                            const ringCompare = diamondRingIndex(b) - diamondRingIndex(a);
                            if (ringCompare !== 0) return ringCompare;
                            return angleFromCenter(a) - angleFromCenter(b);
                        });
                    });
                    return;
                }

                // Confetti: route selection becomes less predictable and more travel-heavy.
                const rng = this.createSeededRandom(1009 + this.level * 7919);
                const difficulty = 1.4;

                this.colorOrder.forEach(color => {
                    const colorCells = cells.filter(cell => cell.color === color);
                    let remaining = colorCells.slice();
                    let order = 1;
                    let current = null;

                    while (remaining.length > 0) {
                        let chosenIndex = 0;

                        if (!current) {
                            chosenIndex = Math.floor(rng() * remaining.length);
                        } else {
                            const scored = remaining.map((cell, index) => {
                                const dx = cell.col - current.col;
                                const dy = cell.row - current.row;
                                const distance = Math.sqrt(dx * dx + dy * dy);
                                const sameLinePenalty = (cell.col === current.col || cell.row === current.row) ? 2.25 : 0;
                                const nearbyPenalty = distance < 2.5 ? 1.5 : 0;
                                const jitter = rng() * 0.35;
                                return {
                                    index,
                                    score: distance * difficulty - sameLinePenalty - nearbyPenalty + jitter
                                };
                            });

                            scored.sort((a, b) => b.score - a.score);
                            const topChoices = scored.slice(0, Math.min(3, scored.length));
                            chosenIndex = topChoices[Math.floor(rng() * topChoices.length)].index;
                        }

                        const [chosen] = remaining.splice(chosenIndex, 1);
                        chosen.order = order++;
                        current = chosen;
                    }
                });
            }

            // Rank of a cell along an outside-in clockwise spiral path.
            getSpiralRank(col, row) {
                const n = 9;
                const targetCol = col - 1;
                const targetRow = row - 1;
                let rank = 0;
                let top = 0;
                let left = 0;
                let bottom = n - 1;
                let right = n - 1;

                while (top <= bottom && left <= right) {
                    for (let c = left; c <= right; c++) {
                        if (top === targetRow && c === targetCol) return rank;
                        rank++;
                    }
                    top++;

                    for (let r = top; r <= bottom; r++) {
                        if (r === targetRow && right === targetCol) return rank;
                        rank++;
                    }
                    right--;

                    if (top <= bottom) {
                        for (let c = right; c >= left; c--) {
                            if (bottom === targetRow && c === targetCol) return rank;
                            rank++;
                        }
                        bottom--;
                    }

                    if (left <= right) {
                        for (let r = bottom; r >= top; r--) {
                            if (r === targetRow && left === targetCol) return rank;
                            rank++;
                        }
                        left++;
                    }
                }

                return rank;
            }

            // Spawn crystals on the 10x10 grid, optionally with intro animation
            spawnCrystals(withIntro = false) {
                const gridSize = this.GRID_SIZE; // Grid cell size
                const centerX = this.PLAYFIELD_SIZE / 2; // Center X coordinate
                const centerY = this.PLAYFIELD_SIZE / 2; // Center Y coordinate
                let colorIndex = 0; // Used only for intro animation timing
                const cells = [];
                
                for (let x = gridSize; x <= this.PLAYFIELD_SIZE - gridSize; x += gridSize) {
                    for (let y = gridSize; y <= this.PLAYFIELD_SIZE - gridSize; y += gridSize) {
                        if (x !== centerX || y !== centerY) { // Skip player spawn point
                            const col = x / gridSize;
                            const row = y / gridSize;
                            const color = this.getCrystalColorForLevelPattern(col, row);
                            cells.push({ x, y, col, row, color, order: 0 });
                        }
                    }
                }

                this.assignCrystalOrders(cells);

                cells.forEach(cell => {
                    const crystal = new Crystal(this, cell.x - this.CRYSTAL_OFFSET, cell.y - this.CRYSTAL_OFFSET, cell.color, cell.order); // Create crystal
                    if (withIntro) {
                        crystal.element.style.animation = 'crystalDrop 0.8s ease-out forwards'; // Drop animation
                        const delay = (colorIndex % 3) * 0.2; // Staggered delay
                        crystal.element.style.animationDelay = `${delay}s`;
                    }
                    this.crystals.push(crystal); // Add to crystals array
                    colorIndex++;
                });
                
                if (withIntro) {
                    setTimeout(() => {
                        this.crystals.forEach(crys => {
                            crys.element.style.animation = ''; // Clear animation
                            crys.element.style.animationDelay = '';
                        });
                        this.updateCrystalHighlight(); // Highlight first crystal
                    }, 2000); // Wait for intro to complete
                } else {
                    this.updateCrystalHighlight(); // Immediate highlight
                }
                this.updateEnemyColors(); // Sync enemy colors
            }

            // Reset crystal-related gameplay elements for new level
            resetCrystalsGameplay() {
                this.crystals.forEach(crys => crys.element.remove()); // Remove all crystals
                this.crystals = [];
                this.collectedPositions = []; // Clear collected positions
                this.lines.forEach(line => line.element.remove()); // Remove connection lines
                this.lines = [];
                const filledSquares = this.container.getElementsByClassName('filled-square');
                while (filledSquares.length > 0) filledSquares[0].remove(); // Clear filled squares
                this.currentColorIndex = 0; // Reset color index
                this.nextCrystalOrder = 1; // Reset crystal order
                this.activeBlinkingCrystals = []; // Reset active blinking choices
                this.lastCollectedPos = null; // Reset last collected position
            }

            // Convert a crystal position to its 9x9 grid coordinate.
            getCrystalGridPosition(crystal) {
                const gridSize = this.GRID_SIZE;
                return {
                    col: Math.round((crystal.x + crystal.size / 2) / gridSize),
                    row: Math.round((crystal.y + crystal.size / 2) / gridSize)
                };
            }

            // Use the most recently collected crystal as the anchor.
            // At the start of a level/color, use the center start position.
            getHighlightReferenceGridPosition() {
                const gridSize = this.GRID_SIZE;
                if (this.lastCollectedPos) {
                    return {
                        col: Math.round(this.lastCollectedPos.x / gridSize),
                        row: Math.round(this.lastCollectedPos.y / gridSize)
                    };
                }
                return { col: 5, row: 5 };
            }

            // Pick one new random blinking crystal from the current color, excluding crystals already blinking.
            chooseOneNewBlinkingCrystal(currentColorCrystals) {
                const activeColor = this.colorOrder[this.currentColorIndex];
                const currentBlinking = new Set(this.activeBlinkingCrystals);
                const options = currentColorCrystals.filter(crystal =>
                    crystal.color === activeColor && !currentBlinking.has(crystal)
                );

                if (options.length === 0) return null;

                return options[Math.floor(Math.random() * options.length)];
            }

            // Keep the current blinking crystals stable.
            // When the player collects one, keep the remaining blinking crystals and add only one new random choice.
            updateCrystalHighlight() {
                this.crystals.forEach(crys => crys.element.classList.remove('next'));

                let currentColorCrystals = this.crystals.filter(crys => 
                    crys.color === this.colorOrder[this.currentColorIndex]
                );

                // If the current color is gone, move to the next remaining color and start a fresh blinking set.
                if (currentColorCrystals.length === 0 && this.crystals.length > 0) {
                    for (let i = 0; i < this.colorOrder.length; i++) {
                        this.currentColorIndex = (this.currentColorIndex + 1) % this.colorOrder.length;
                        currentColorCrystals = this.crystals.filter(crys => 
                            crys.color === this.colorOrder[this.currentColorIndex]
                        );
                        if (currentColorCrystals.length > 0) break;
                    }
                    this.nextCrystalOrder = 1;
                    this.activeBlinkingCrystals = [];
                    this.updateEnemyColors();
                }

                const activeColor = this.colorOrder[this.currentColorIndex];

                // Keep already-selected blinking crystals if they still exist and still match the current color.
                this.activeBlinkingCrystals = this.activeBlinkingCrystals.filter(crystal =>
                    this.crystals.includes(crystal) && crystal.color === activeColor
                );

                const desiredBlinkingCount = Math.min(this.currentBlinkingCrystalCount, currentColorCrystals.length);

                // If bomb use reduced the allowed choices, remove extra blinking selections without rerolling the rest.
                while (this.activeBlinkingCrystals.length > desiredBlinkingCount) {
                    const removeIndex = Math.floor(Math.random() * this.activeBlinkingCrystals.length);
                    this.activeBlinkingCrystals.splice(removeIndex, 1);
                }

                // Top up only the missing slots instead of rerolling all blinking crystals.
                while (this.activeBlinkingCrystals.length < desiredBlinkingCount) {
                    const nextCrystal = this.chooseOneNewBlinkingCrystal(currentColorCrystals);
                    if (!nextCrystal) break;
                    this.activeBlinkingCrystals.push(nextCrystal);
                }

                if (this.activeBlinkingCrystals.length > 0) {
