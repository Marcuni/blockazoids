                    this.nextCrystalOrder = this.activeBlinkingCrystals[0].order;
                    this.activeBlinkingCrystals.forEach(crystal => crystal.element.classList.add('next'));
                }
            }

            // Award one point per full second of active gameplay.
            awardSurvivalTimePoints(deltaTime) {
                this.survivalScoreAccumulator += deltaTime;
                const secondsEarned = Math.floor(this.survivalScoreAccumulator / 1000);
                if (secondsEarned > 0) {
                    this.survivalScoreAccumulator -= secondsEarned * 1000;
                    this.score += secondsEarned;
                    this.ui.updateScore();
                }
            }

            // Main game loop for real-time updates
            gameLoop(timestamp, runToken = this.gameplayRunToken) {
                if (runToken !== this.gameplayRunToken || !this.active || this.isPaused || this.isGameOver || !this.levelActionStarted) return; // Exit if game is paused, waiting, or over
                const deltaTime = timestamp - this.lastFrameTime; // Time since last frame
                this.lastFrameTime = timestamp;
                this.awardSurvivalTimePoints(deltaTime); // +1 point for each active gameplay second
                this.updateEnemies(deltaTime); // Update enemy positions
                this.checkCollisions(); // Check for collisions
                this.checkLevelCompletion(); // Check if level is complete
                this.explosions = this.explosions.filter(exp => exp.update()); // Update and filter explosions
                requestAnimationFrame((t) => this.gameLoop(t, runToken)); // Request next frame
            }

            // Remove or cancel pending spawn telegraphs.
            clearPendingSpawnWarnings(requeue = false) {
                const pending = this.pendingSpawnWarnings.slice();
                this.pendingSpawnWarnings = [];

                if (requeue) {
                    for (let i = pending.length - 1; i >= 0; i--) {
                        this.spawnQueue.unshift(pending[i].type);
                    }
                }

                pending.forEach(item => {
                    if (item.timeoutId) clearTimeout(item.timeoutId);
                    if (item.warning) item.warning.remove();
                });
            }

            // Choose a peripheral grid square, then clamp the actual enemy fully inside the board.
            // This keeps large Block-A-Zoids from being rejected when they are bigger than one edge grid square.
            choosePeripheralSpawnLocation(enemySize) {
                const playerCenterX = this.player.x + this.player.size / 2;
                const playerCenterY = this.player.y + this.player.size / 2;
                const strictCells = [];
                const fallbackCells = [];
                const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

                for (let col = 0; col < 10; col++) {
                    for (let row = 0; row < 10; row++) {
                        const isPeripheral = col === 0 || col === 9 || row === 0 || row === 9;
                        if (!isPeripheral) continue;

                        const targetCenterX = (col + 0.5) * this.GRID_SIZE;
                        const targetCenterY = (row + 0.5) * this.GRID_SIZE;
                        const x = clamp(targetCenterX - enemySize / 2, 0, this.PLAYFIELD_SIZE - enemySize);
                        const y = clamp(targetCenterY - enemySize / 2, 0, this.PLAYFIELD_SIZE - enemySize);
                        const centerX = x + enemySize / 2;
                        const centerY = y + enemySize / 2;

                        const overlapsEnemy = this.enemies.some(enemy =>
                            x < enemy.x + enemy.size &&
                            x + enemySize > enemy.x &&
                            y < enemy.y + enemy.size &&
                            y + enemySize > enemy.y
                        );
                        if (overlapsEnemy) continue;

                        const overlapsPending = this.pendingSpawnWarnings.some(item =>
                            x < item.spawnX + item.size &&
                            x + enemySize > item.spawnX &&
                            y < item.spawnY + item.size &&
                            y + enemySize > item.spawnY
                        );
                        if (overlapsPending) continue;

                        const distanceToPlayer = Math.hypot(centerX - playerCenterX, centerY - playerCenterY);
                        const cell = {
                            x,
                            y,
                            centerX,
                            centerY,
                            warningX: col * this.GRID_SIZE,
                            warningY: row * this.GRID_SIZE,
                            distanceToPlayer
                        };
                        fallbackCells.push(cell);

                        if (distanceToPlayer >= this.MIN_SPAWN_DISTANCE) {
                            strictCells.push(cell);
                        }
                    }
                }

                if (strictCells.length > 0) {
                    return strictCells[Math.floor(Math.random() * strictCells.length)];
                }

                if (fallbackCells.length === 0) return null;

                // If the strict distance rule leaves no legal spawn, use the farthest safe peripheral square.
                fallbackCells.sort((a, b) => b.distanceToPlayer - a.distanceToPlayer);
                const topChoices = fallbackCells.slice(0, Math.min(4, fallbackCells.length));
                return topChoices[Math.floor(Math.random() * topChoices.length)];
            }

            // Flash one grid cell first, then materialize the queued enemy in its clamped spawn location.
            // The warning is always the same size so it does not reveal the next Block-A-Zoid size.
            startEnemySpawnWarning(type) {
                const size = type === 'small' ? this.PLAYER_SIZE : (type === 'medium' ? this.PLAYER_SIZE * 2 : this.PLAYER_SIZE * 3);
                const location = this.choosePeripheralSpawnLocation(size);
                if (!location) return false;

                const warning = new SpawnWarning(this, location.warningX, location.warningY, this.GRID_SIZE);
                const pending = { type, warning, size, spawnX: location.x, spawnY: location.y, timeoutId: null };

                pending.timeoutId = setTimeout(() => {
                    this.pendingSpawnWarnings = this.pendingSpawnWarnings.filter(item => item !== pending);
                    warning.remove();

                    if (!this.active || this.isPaused || this.isGameOver || !this.levelActionStarted) {
                        this.spawnQueue.unshift(type);
                        return;
                    }

                    const enemy = new Enemy(this, type, { x: location.x, y: location.y });
                    this.enemies.push(enemy);
                    if (enemy.size === this.PLAYER_SIZE) this.spawnedCount.small++;
                    else if (enemy.size === this.PLAYER_SIZE * 2) this.spawnedCount.medium++;
                    else this.spawnedCount.large++;
                }, this.spawnWarningDurationMs);

                this.pendingSpawnWarnings.push(pending);
                return true;
            }

            // Periodic update for enemy spawning
            updateGame() {
                this.updateGameTimer = null;
                if (!this.active || this.isPaused || this.isGameOver || !this.levelActionStarted) return; // Exit if game is paused, waiting, or over

                if (this.spawnCounter >= this.spawnRate && 
                    this.enemies.length + this.pendingSpawnWarnings.length < this.MAX_ENEMIES &&
                    this.spawnQueue.length > 0) { // Telegraph the next enemy if conditions met
                    const nextType = this.spawnQueue[0];
                    if (this.startEnemySpawnWarning(nextType)) {
                        this.spawnCounter = 0; // Reset counter only when a valid telegraph was created
                        this.spawnQueue.shift();
                    }
                }
                this.spawnCounter++; // Increment spawn counter

                this.updateGameTimer = setTimeout(() => this.updateGame(), 1000); // Schedule next update
            }

            // Check if level is complete and advance to next level
            checkLevelCompletion() {
                if (this.isGameOver) return; // Exit if game is over
                if (this.crystals.length === 0) { // All crystals collected
                    this.active = false; // Prevent repeated completion triggers before the next level starts
                    this.releaseWakeLock();
                    const bonus = this.bombsLeft * this.parameters.unusedBombBonus; // Bonus = remaining bombs × 50
                    this.score += bonus; // Add bonus to score without adding a separate between-level pause
                    this.ui.updateScore(); // Update UI immediately

                    if (this.level >= this.MAX_LEVEL) {
                        setTimeout(() => this.finishGame(), 500);
                        return;
                    }

                    this.level++; // Advance level
                    this.spawnCounter = 0; // Reset spawn counter
                    this.bombsLeft = this.parameters.baseBombs; // New level starts with all bombs restored
                    this.currentBlinkingCrystalCount = this.BASE_BLINKING_CRYSTAL_COUNT; // New level restores five blinking choices
                    this.survivalScoreAccumulator = 0;
                    this.bombPressure = 0; // New level starts without bomb pressure
                    this.enemies.forEach(enemy => enemy.element.remove()); // Clear enemies
                    this.enemies = [];
                    this.spawnedCount = { small: 0, medium: 0, large: 0 }; // Reset spawn counts
                    this.applyLevelParameters(); // Update spawn parameters
                    this.ui.updateAll(); // Update score, bombs, and level indicators
                    
                    this.active = false;
                    this.waitingForPlayerMove = false;
                    this.levelActionStarted = false;
                    this.gameplayRunToken++;
                    this.clearUpdateGameTimer();
                    this.player.reset(); // Reset player position
                    this.audio.stopBackgroundMusic(); // Stop music
                    this.resetCrystalsGameplay(); // Reset crystals
                    
                    const loadToken = ++this.levelLoadToken;
                    this.startPreparedLevel(loadToken);
                }
            }

            // Display bonus text for end-of-level reward
            showBonusText(bonus) {
                this.bonusTextElement.textContent = `BONUS: ${bonus}`; // Set bonus message
                this.bonusTextElement.style.opacity = '1'; // Fade in
                setTimeout(() => {
                    this.bonusTextElement.style.opacity = '0'; // Fade out after 1s
                }, 1000); // Display for 1s
            }

            // Bomb use has no point-loss popup; the reduced blinking choices and bomb icon are enough feedback.
            showBombPenaltyText() {
                // Intentionally blank.
            }

            // Update enemy positions and resolve collisions
            updateEnemies(deltaTime) {
                this.enemies.forEach(enemy => enemy.update(deltaTime)); // Update each enemy
                let collisionOccurred = true;
                const maxIterations = 5; // Max iterations to resolve collisions
                let iteration = 0;
                while (collisionOccurred && iteration < maxIterations) { // Resolve enemy-enemy collisions
                    collisionOccurred = false;
                    iteration++;
                    for (let i = 0; i < this.enemies.length; i++) {
                        const enemyA = this.enemies[i];
                        for (let j = i + 1; j < this.enemies.length; j++) {
                            const enemyB = this.enemies[j];
                            if (enemyA.collidesWith(enemyB)) {
                                collisionOccurred = true;
                                enemyA.resolveCollisionWith(enemyB); // Adjust positions and velocities
                            }
                        }
                    }
                }
            }

            // Check collisions between player, enemies, and crystals
            checkCollisions() {
                if (this.isGameOver) return; // Exit if game is over
                for (const enemy of this.enemies) {
                    if (enemy.collidesWithPlayer()) { // Player-enemy collision
                        this.endGame(); // End game
                        return;
                    }
                }
                if (this.player.isOutOfBounds()) { // Player out of bounds
                    this.endGame();
                    return;
                }

                for (let i = this.crystals.length - 1; i >= 0; i--) { // Check player-crystal collisions
                    const crystal = this.crystals[i];
                    if (crystal.collidesWithPlayer() && crystal.color === this.colorOrder[this.currentColorIndex]) {
                        const isBlinkingCrystal = crystal.element.classList.contains('next');

                        // Test rule: only blinking crystals are collectible.
                        // Touching same-color non-blinking crystals does nothing.
                        if (!isBlinkingCrystal) continue;

                        const pos = { x: crystal.x + crystal.size / 2, y: crystal.y + crystal.size / 2 }; // Crystal center
                        this.collectedPositions.push(pos); // Add to collected
                        this.connectToNearestIntersection(pos); // Connect to grid
                        crystal.element.remove(); // Remove crystal
                        this.crystals.splice(i, 1); // Remove from array

                        this.score += 10; // Blinking crystal collection
                        this.lastCollectedPos = pos; // Anchor the next blink around the most recent collection.
                        this.ui.updateScore(); // Update UI
                        this.audio.playCollect(); // Play collect sound

                        if (!this.crystals.some(crys => crys.color === this.colorOrder[this.currentColorIndex])) { // No more of current color
                            this.score += this.parameters.colorCompleteBonus; // Finished one RGB color set
                            this.ui.updateScore();
                            this.audio.playColorComplete();
                            this.currentColorIndex = (this.currentColorIndex + 1) % this.colorOrder.length; // Next color
                            this.nextCrystalOrder = 1; // Reset order
                            this.activeBlinkingCrystals = []; // Start a fresh random set for the new color
                            this.updateEnemyColors(); // Sync enemy colors
                        }
                        this.updateCrystalHighlight(); // Keep remaining blinking crystals and top up one new random choice.
                    }
                }
            }

            // Connect collected crystal to nearest grid intersection
            connectToNearestIntersection(currentPos) {
                const gridSize = this.GRID_SIZE; // Grid cell size
                const directions = [ // Possible connection directions
                    { dx: 0, dy: -gridSize, horizontal: false }, // Up
                    { dx: 0, dy: gridSize, horizontal: false },  // Down
                    { dx: -gridSize, dy: 0, horizontal: true },  // Left
                    { dx: gridSize, dy: 0, horizontal: true }    // Right
                ];

                directions.forEach(dir => {
                    const targetPos = { x: currentPos.x + dir.dx, y: currentPos.y + dir.dy };
                    if (this.collectedPositions.some(pos => pos.x === targetPos.x && pos.y === targetPos.y)) {
                        this.drawLine(currentPos, targetPos, dir.horizontal); // Draw connection line
                        this.checkForCompletedSquare(currentPos, targetPos); // Check for square
                    }
                });
            }

            // Draw a connection line between two points
            drawLine(startPos, endPos, horizontal) {
                const line = document.createElement('div');
                line.className = 'connection-line';
                line.style.left = `${Math.min(startPos.x, endPos.x)}px`;
                line.style.top = `${Math.min(startPos.y, endPos.y)}px`;
                if (horizontal) {
                    line.style.width = `${this.GRID_SIZE}px`; // Horizontal line
                    line.style.height = '2px';
                } else {
                    line.style.width = '2px'; // Vertical line
                    line.style.height = `${this.GRID_SIZE}px`;
                }
                this.container.appendChild(line);
                this.lines.push({ start: startPos, end: endPos, element: line }); // Store line
            }

            // Check if a completed square is formed
            checkForCompletedSquare(startPos, endPos) {
                const gridSize = this.GRID_SIZE;
                const minX = Math.min(startPos.x, endPos.x);
                const minY = Math.min(startPos.y, endPos.y);
                const maxX = Math.max(startPos.x, endPos.x);
                const maxY = Math.max(startPos.y, endPos.y);

                const potentialSquares = []; // Possible square starting points
                if (startPos.x === endPos.x) { // Vertical line
                    potentialSquares.push({ x: minX - gridSize, y: minY });
                    potentialSquares.push({ x: minX, y: minY });
                } else { // Horizontal line
                    potentialSquares.push({ x: minX, y: minY - gridSize });
                    potentialSquares.push({ x: minX, y: minY });
                }

                potentialSquares.forEach(square => {
                    const corners = [ // Corners of potential square
                        { x: square.x, y: square.y },
                        { x: square.x + gridSize, y: square.y },
                        { x: square.x, y: square.y + gridSize },
                        { x: square.x + gridSize, y: square.y + gridSize }
                    ];
                    if (corners.every(corner => this.collectedPositions.some(pos => pos.x === corner.x && pos.y === corner.y))) { // All corners collected
                        const sides = [ // Sides of the square
                            { start: corners[0], end: corners[1] },
                            { start: corners[1], end: corners[3] },
                            { start: corners[2], end: corners[3] },
                            { start: corners[0], end: corners[2] }
                        ];
                        if (sides.every(side => this.lines.some(line => // All sides connected
                            (line.start.x === side.start.x && line.start.y === side.start.y && line.end.x === side.end.x && line.end.y === side.end.y) ||
                            (line.start.x === side.end.x && line.start.y === side.end.y && line.end.x === side.start.x && line.end.y === side.start.y)
                        ))) {
                            this.fillSquare(square.x, square.y); // Fill completed square
                        }
                    }
                });
            }

            // Fill a completed square visually only; no square score bonus.
            fillSquare(x, y) {
                const existingSquares = Array.from(this.container.getElementsByClassName('filled-square'));
                if (!existingSquares.some(square => // Check if square already filled
                    parseInt(square.style.left) === x && parseInt(square.style.top) === y)) {
                    const square = document.createElement('div');
                    square.className = 'filled-square';
                    square.style.left = `${x}px`;
                    square.style.top = `${y}px`;
                    this.container.appendChild(square);
                }
            }

            // Update enemy colors to match current crystal color
            updateEnemyColors() {
                const currentColor = this.colorMap[this.colorOrder[this.currentColorIndex]];
                this.enemies.forEach(enemy => {
                    enemy.element.style.backgroundColor = currentColor; // Set color
                    enemy.updateAnimation(); // Update border and glow
                });
            }

            // Enable shake-to-bomb. iOS requires motion permission from a tap/click gesture.
            async enableShakeBomb() {
                if (this.motionBombEnabled) return;
                if (typeof DeviceMotionEvent === 'undefined') return;

                try {
                    if (typeof DeviceMotionEvent.requestPermission === 'function') {
                        const permission = await DeviceMotionEvent.requestPermission();
                        if (permission !== 'granted') return;
                    }

                    window.addEventListener('devicemotion', this.handleDeviceMotion, { passive: true });
                    this.motionBombEnabled = true;
                } catch (_) {
                    // If permission is denied or motion is unavailable, bombs can still be tested with Space on desktop.
                }
            }

            // Shake the phone to use a bomb. Uses acceleration changes, not absolute tilt.
            handleShakeMotion(e) {
                if (!this.active || this.isPaused || this.isGameOver || this.bombsLeft <= 0) return;

                const a = e.accelerationIncludingGravity || e.acceleration;
                if (!a) return;

                const x = a.x || 0;
                const y = a.y || 0;
                const z = a.z || 0;

                if (!this.lastMotionSample) {
                    this.lastMotionSample = { x, y, z };
                    return;
                }

                const delta = Math.abs(x - this.lastMotionSample.x) +
                              Math.abs(y - this.lastMotionSample.y) +
                              Math.abs(z - this.lastMotionSample.z);

                this.lastMotionSample = { x, y, z };

                const now = performance.now();
                if (delta >= this.shakeThreshold && now - this.lastShakeBombTime >= this.shakeBombCooldownMs) {
                    this.lastShakeBombTime = now;
                    this.handleBomb();
                }
            }

            // Handle bomb detonation with screen shake, enemy destruction, and fewer blinking choices for this level.
            handleBomb() {
                if (this.bombsLeft > 0 && this.active && !this.isPaused && !this.isGameOver) { // Bomb available and game active
                    const now = performance.now();
                    if (now - this.lastBombTriggerTime < this.bombInputCooldownMs) return;
                    this.lastBombTriggerTime = now;

                    this.bombsLeft--; // Decrease bomb count
                    this.bombPressure++; // Adds one temporary level-speed notch for the rest of this level
                    this.currentBlinkingCrystalCount = Math.max(1, this.currentBlinkingCrystalCount - 1); // Bomb use lowers active blinking choices for this level only
                    this.ui.updateBombIndicators(); // Update UI
                    this.audio.playBomb(); // Play bomb sound
                    this.container.classList.add('shake'); // Apply screen shake

                    if (this.enemies.length > 0) { // Enemies present
                        this.enemies.forEach(enemy => {
                            this.explosions.push(new Explosion(this, enemy.x + enemy.size / 2, enemy.y + enemy.size / 2, false)); // Create explosion
                            enemy.element.remove(); // Remove enemy
                        });
                        this.enemies = []; // Clear enemies
                    }

                    this.applyLevelParameters(); // Rebuild spawn queue; bomb pressure affects speed only
                    this.spawnCounter = Math.max(0, this.spawnRate - 1); // Enemies return soon, not from a fully relaxed state
                    setTimeout(() => this.container.classList.remove('shake'), 500); // Remove shake after 500ms
                    this.updateCrystalHighlight(); // Update highlight
                }
            }

            // Count live neighbors for a cell in the Game of Life grid
            countNeighbors(grid, x, y) {
                const width = 10;
                const height = 10;
                let count = 0;
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        if (i === 0 && j === 0) continue; // Skip self
                        const newX = (x + i + width) % width; // Wrap around edges
                        const newY = (y + j + height) % height;
                        count += grid[newX][newY]; // Add neighbor state
                    }
                }
                return count;
            }

            // Compute the next generation of the Game of Life grid
            nextGeneration() {
                const newGrid = Array(10).fill().map(() => Array(10).fill(0));
                for (let x = 0; x < 10; x++) {
                    for (let y = 0; y < 10; y++) {
                        const neighbors = this.countNeighbors(this.lifeGrid, x, y);
                        if (this.lifeGrid[x][y]) { // Live cell
                            newGrid[x][y] = (neighbors === 2 || neighbors === 3) ? 1 : 0; // Survive or die
                        } else { // Dead cell
                            newGrid[x][y] = (neighbors === 3) ? 1 : 0; // Birth or stay dead
                        }
                    }
                }
                return newGrid;
            }

            // Start attract mode with Conway's Game of Life pattern, less busy
            startAttractMode() {
                this.stopAttractMode(); // Clear any existing attract mode
                const gridSize = this.GRID_SIZE; // Grid cell size
                const gridWidth = this.PLAYFIELD_SIZE / gridSize; // 10
                const gridHeight = this.PLAYFIELD_SIZE / gridSize; // 10

                // Initialize grid with 15% chance of life for a sparser pattern
                this.lifeGrid = Array(10).fill().map(() => 
                    Array(10).fill().map(() => Math.random() < 0.15 ? 1 : 0)
                );

                const updatePattern = () => {
                    this.attractSquares.forEach(square => square.remove()); // Clear existing squares
                    this.attractSquares = [];

                    this.lifeGrid = this.nextGeneration(); // Compute next generation

                    // Display live cells as flashing squares
                    for (let x = 0; x < gridWidth; x++) {
                        for (let y = 0; y < gridHeight; y++) {
                            if (this.lifeGrid[x][y]) {
                                const square = document.createElement('div');
                                square.className = 'filled-square attract-square';
                                square.style.left = `${x * gridSize}px`;
                                square.style.top = `${y * gridSize}px`;
                                square.style.animationDelay = `${Math.random() * 0.5}s`; // Random flash delay
                                this.container.appendChild(square);
                                this.attractSquares.push(square);
                            }
                        }
                    }

                    // Reset grid if all cells die
                    const totalLive = this.lifeGrid.flat().reduce((sum, val) => sum + val, 0);
                    if (totalLive === 0) {
                        this.lifeGrid = Array(10).fill().map(() => 
                            Array(10).fill().map(() => Math.random() < 0.15 ? 1 : 0)
                        );
                    }
                };

                updatePattern(); // Initial pattern
                this.attractInterval = setInterval(updatePattern, 1000); // Update every second
            }

            // Stop attract mode and clean up
            stopAttractMode() {
                if (this.attractInterval) {
                    clearInterval(this.attractInterval); // Stop interval
                    this.attractInterval = null;
                }
                this.attractSquares.forEach(square => square.remove()); // Remove squares
                this.attractSquares = [];
                this.lifeGrid = []; // Clear grid
            }

            // Complete the 10-level test campaign.
            finishGame() {
                if (this.isGameOver) return;
                this.active = false;
                this.isGameOver = true;
                this.isPaused = false;
                this.gameplayRunToken++;
                this.clearUpdateGameTimer();
                this.releaseWakeLock();
                this.pauseWindow.style.display = 'none';
                if (this.menuButtons && this.scoringPanel && this.storyPanel) this.showMainMenuButtons();
                this.cheatWindow.style.display = 'none';
                this.audio.stopBackgroundMusic();
                this.clearGameplayObjects();
                this.player.element.style.display = 'none';
                this.gameOverElement.textContent = 'YOU WIN';
                this.gameOverElement.style.opacity = '1';
                this.bonusTextElement.textContent = `FINAL ${this.score}`;
                this.bonusTextElement.style.opacity = '1';
                this.audio.playEnd();
                setTimeout(() => {
                    this.gameOverElement.style.opacity = '0';
                    this.bonusTextElement.style.opacity = '0';
                    setTimeout(() => {
                        this.instructionsWindow.style.display = 'flex';
                        this.startButton.textContent = 'Play Again';
                        this.startAttractMode();
                    }, 500);
                }, 3000);
            }

            // End the game with explosion and screen shake
            endGame() {
                if (this.isGameOver) return; // Exit if already over
                this.active = false; // Pause game
                this.isGameOver = true;
                this.isPaused = false;
                this.gameplayRunToken++;
                this.clearUpdateGameTimer();
                this.releaseWakeLock();
                this.pauseWindow.style.display = 'none';
                if (this.menuButtons && this.scoringPanel && this.storyPanel) this.showMainMenuButtons();
                this.cheatWindow.style.display = 'none';
                this.audio.stopBackgroundMusic(); // Stop music
                // Keep input listeners attached. The handlers already ignore input while inactive or game over.

                this.explosions.push(new Explosion(this, this.player.x, this.player.y, true)); // Player explosion
                this.container.classList.add('shake'); // Screen shake
                this.audio.playExplosion(true); // Explosion sound
                this.enemies.forEach(enemy => enemy.element.remove()); // Clear enemies
                this.enemies = [];
                this.crystals.forEach(crys => crys.element.remove()); // Clear crystals
                this.crystals = [];
                this.lines.forEach(line => line.element.remove()); // Clear lines
                this.lines = [];
                const filledSquares = this.container.getElementsByClassName('filled-square');
                while (filledSquares.length > 0) filledSquares[0].remove(); // Clear filled squares

                setTimeout(() => this.container.classList.remove('shake'), 500); // Remove shake after 500ms

                setTimeout(() => { // Show game over sequence
                    this.bonusTextElement.classList.remove('countdownText');
                    this.gameOverElement.textContent = 'GAME OVER';
                    this.gameOverElement.style.opacity = '1'; // Show game over text
                    this.audio.playEnd(); // Play end sound
                    this.audio.resume(); // Resume audio context
                    setTimeout(() => {
                        this.gameOverElement.style.opacity = '0'; // Fade out text
                        setTimeout(() => {
                            this.instructionsWindow.style.display = 'flex'; // Show instructions
                            this.startButton.textContent = 'Play Again'; // Update button
                            this.startAttractMode(); // Restart attract mode
                        }, 500);
                    }, 2000);
                }, 1200);
            }
        }

        // Player class for handling movement and state
        class Player {
            constructor(game) {
                this.game = game; // Reference to game instance
                this.element = document.getElementById('player'); // Player DOM element
                this.size = game.PLAYER_SIZE; // Player size from game parameters
                this.isMouseActive = false; // Mouse control state
                this.isTouchActive = false; // Touch/pointer drag state
                this.touchDragOffsetX = 0;
                this.touchDragOffsetY = 0;
                this.touchActivationPadding = Math.max(18, game.PLAYER_SIZE * 1.5);
                this.reset(); // Initialize position
            }

            // Reset player to center of playfield
            reset() {
                this.size = this.game.PLAYER_SIZE;
                this.touchActivationPadding = Math.max(18, this.size * 1.5);
                this.x = this.game.PLAYFIELD_SIZE / 2 - this.size / 2; // Center X
                this.y = this.game.PLAYFIELD_SIZE / 2 - this.size / 2; // Center Y
                this.element.style.display = 'block'; // Show player
                this.isMouseActive = false; // Disable mouse control
                this.isTouchActive = false; // Disable touch control
                this.touchDragOffsetX = 0;
                this.touchDragOffsetY = 0;
                this.updatePosition(); // Update DOM position
            }

            // Convert browser coordinates into the actual board coordinate system.
            getBoardPoint(clientX, clientY) {
                const rect = this.game.container.getBoundingClientRect();
                return {
                    x: Math.max(0, Math.min(this.game.PLAYFIELD_SIZE, clientX - rect.left)),
                    y: Math.max(0, Math.min(this.game.PLAYFIELD_SIZE, clientY - rect.top))
                };
            }

            pointIsNearPlayer(point) {
                const padding = this.touchActivationPadding;
                return point.x >= this.x - padding &&
                       point.x <= this.x + this.size + padding &&
                       point.y >= this.y - padding &&
                       point.y <= this.y + this.size + padding;
            }

            moveToPoint(point, keepTouchOffset = false) {
                const previousX = this.x;
                const previousY = this.y;
                const targetCenterX = keepTouchOffset ? point.x - this.touchDragOffsetX : point.x;
                const targetCenterY = keepTouchOffset ? point.y - this.touchDragOffsetY : point.y;

                this.x = Math.max(0, Math.min(this.game.PLAYFIELD_SIZE - this.size,
                    targetCenterX - this.size / 2));
                this.y = Math.max(0, Math.min(this.game.PLAYFIELD_SIZE - this.size,
                    targetCenterY - this.size / 2));
                this.updatePosition();

                if (this.game.waitingForPlayerMove && (this.x !== previousX || this.y !== previousY)) {
                    this.game.beginLevelAction();
                }
            }

            // Desktop fallback: hover the orb, then move it.
            handleMouseMove(e) {
                if (!this.game.active || this.game.isPaused || this.game.isGameOver || this.isTouchActive) return;

                const point = this.getBoardPoint(e.clientX, e.clientY);

                if (!this.isMouseActive) {
                    const playerLeft = this.x;
                    const playerTop = this.y;
                    const playerRight = this.x + this.size;
                    const playerBottom = this.y + this.size;

                    if (point.x >= playerLeft && point.x <= playerRight &&
                        point.y >= playerTop && point.y <= playerBottom) {
                        this.isMouseActive = true;
                    }
                }

                if (this.isMouseActive) {
                    this.moveToPoint(point);
                }
            }

            // iPhone control: touch must begin on or near the orb, then dragging moves it.
            handlePointerDown(e) {
                if (!this.game.active || this.game.isPaused || this.game.isGameOver) return;
                if (e.pointerType === 'mouse') return;

                const point = this.getBoardPoint(e.clientX, e.clientY);
                if (!this.pointIsNearPlayer(point)) return; // Prevent tap-anywhere teleporting.

                e.preventDefault();
                this.isTouchActive = true;
                this.touchDragOffsetX = point.x - (this.x + this.size / 2);
                this.touchDragOffsetY = point.y - (this.y + this.size / 2);

                if (this.game.container.setPointerCapture) {
                    try { this.game.container.setPointerCapture(e.pointerId); } catch (_) {}
                }
            }

            handlePointerMove(e) {
                if (!this.game.active || this.game.isPaused || this.game.isGameOver || !this.isTouchActive) return;
                if (e.pointerType === 'mouse') return;

                e.preventDefault();
                const point = this.getBoardPoint(e.clientX, e.clientY);
                this.moveToPoint(point, true);
            }

            handlePointerUp(e) {
                if (e && e.pointerType === 'mouse') return;
                if (e && this.isTouchActive) e.preventDefault();

                this.isTouchActive = false;
                this.touchDragOffsetX = 0;
                this.touchDragOffsetY = 0;
            }

            // Update player position in DOM
            updatePosition() {
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }

            // The player is clamped inside the playfield, so touching the wall is safe.
            isOutOfBounds() {
                return false;
            }
        }

        // Warning telegraph shown before an enemy actually appears.
        class SpawnWarning {
            constructor(game, x, y, size) {
                this.game = game;
                this.x = x;
                this.y = y;
                this.size = size;

                this.element = document.createElement('div');
                this.element.className = 'spawn-warning';
                this.element.style.left = `${x}px`;
                this.element.style.top = `${y}px`;
                this.element.style.width = `${size}px`;
                this.element.style.height = `${size}px`;
                game.container.appendChild(this.element);
            }

            remove() {
                this.element.remove();
            }
        }

        // Enemy class for handling movement and behavior
        class Enemy {
            constructor(game, type, spawnLocation = null) {
                this.game = game; // Reference to game instance
                if (type === 'small') { // Small enemy
                    this.size = game.PLAYER_SIZE;
                    this.speed = game.getEnemySpeed('small');
                } else if (type === 'medium') { // Medium enemy
                    this.size = game.PLAYER_SIZE * 2;
                    this.speed = game.getEnemySpeed('medium');
                } else { // Large enemy
                    this.size = game.PLAYER_SIZE * 3;
                    this.speed = game.getEnemySpeed('large');
                }
                
                if (spawnLocation) {
                    this.x = spawnLocation.x;
                    this.y = spawnLocation.y;
                } else {
                    let attempts = 0;
                    const maxAttempts = 50; // Max spawn attempts
                    do { // Fallback random spawn away from player and other enemies
                        this.x = Math.random() * (game.PLAYFIELD_SIZE - this.size);
                        this.y = Math.random() * (game.PLAYFIELD_SIZE - this.size);
                        attempts++;
                        if (attempts > maxAttempts) break; // Prevent infinite loop
                    } while (this.distanceToPlayer() < game.MIN_SPAWN_DISTANCE || this.overlapsOtherEnemies());
                }
                
                this.dx = (Math.random() > 0.5 ? 1 : -1) * this.speed; // Random X direction
                this.dy = (Math.random() > 0.5 ? 1 : -1) * this.speed; // Random Y direction
                
                this.element = document.createElement('div');
                this.element.className = 'enemy';
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.backgroundColor = this.game.colorMap[this.game.colorOrder[this.game.currentColorIndex]]; // Set color
                this.element.style.transform = 'scale(0)'; // Start scaled down
                this.updatePosition(); // Set initial position
                game.container.appendChild(this.element); // Add to DOM
                setTimeout(() => { // Fade in animation
                    this.element.style.opacity = '1';
                    this.element.style.transform = 'scale(1)';
                }, 50);
                game.audio.playSpawn(this.size); // Play spawn sound

                this.updateAnimation(); // Set border and glow
            }

            // Calculate distance to player
            distanceToPlayer() {
                return Math.sqrt((this.x - this.game.player.x) ** 2 + (this.y - this.game.player.y) ** 2);
            }

            // Check if this enemy overlaps with others
            overlapsOtherEnemies() {
                return this.game.enemies.some(other => 
                    other !== this &&
                    this.x < other.x + other.size &&
                    this.x + this.size > other.x &&
                    this.y < other.y + other.size &&
                    this.y + this.size > other.y
                );
            }

            // Update enemy position based on velocity and time
            update(deltaTime) {
                this.x += this.dx * (deltaTime / 16.67); // Move X (normalized to 60fps)
                this.y += this.dy * (deltaTime / 16.67); // Move Y
                
                if (this.x <= 0 || this.x >= this.game.PLAYFIELD_SIZE - this.size) { // Bounce off X bounds
                    this.x = Math.max(0, Math.min(this.game.PLAYFIELD_SIZE - this.size, this.x));
                    this.dx = -this.dx;
                    this.flashBorder(); // Flash border on bounce
                }
                if (this.y <= 0 || this.y >= this.game.PLAYFIELD_SIZE - this.size) { // Bounce off Y bounds
                    this.y = Math.max(0, Math.min(this.game.PLAYFIELD_SIZE - this.size, this.y));
                    this.dy = -this.dy;
                    this.flashBorder();
                }
                
                this.updatePosition(); // Update DOM position
            }

            // Update enemy position in DOM
            updatePosition() {
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }

            // Update enemy border and glow animation
            updateAnimation() {
                this.element.style.setProperty('--enemy-color', '#fff'); // White border for contrast
                this.element.style.border = `1px solid #fff`; // Consistent border
            }

            // Flash border on collision or bounce
            flashBorder() {
                this.element.classList.add('enemyBorderFlash'); // Enemy flash
                this.game.container.classList.add('borderFlash'); // Container flash
                setTimeout(() => {
                    this.element.classList.remove('enemyBorderFlash');
                    this.game.container.classList.remove('borderFlash');
                    this.updateAnimation(); // Reset animation
                }, 300); // Duration matches animation
            }

            // Resolve collision with another enemy
            resolveCollisionWith(other) {
                const overlapX = Math.min(this.x + this.size, other.x + other.size) - Math.max(this.x, other.x);
                const overlapY = Math.min(this.y + this.size, other.y + other.size) - Math.max(this.y, other.y);

                if (overlapX > 0 && overlapY > 0) { // Collision detected
                    if (overlapX < overlapY) { // Resolve along X-axis
                        if (this.x < other.x) {
                            this.x -= overlapX / 2;
                            other.x += overlapX / 2;
                        } else {
                            this.x += overlapX / 2;
                            other.x -= overlapX / 2;
                        }
                        [this.dx, other.dx] = [other.dx, this.dx]; // Swap X velocities
                    } else { // Resolve along Y-axis
                        if (this.y < other.y) {
                            this.y -= overlapY / 2;
                            other.y += overlapY / 2;
                        } else {
                            this.y += overlapY / 2;
                            other.y -= overlapY / 2;
                        }
                        [this.dy, other.dy] = [other.dy, this.dy]; // Swap Y velocities
                    }

                    this.flashBorder(); // Flash this enemy
                    other.flashBorder(); // Flash other enemy
                    this.updatePosition(); // Update positions
                    other.updatePosition();
                }
            }

            // Check collision with another object
            collidesWith(other) {
                return (this.x < other.x + other.size &&
                        this.x + this.size > other.x &&
                        this.y < other.y + other.size &&
                        this.y + this.size > other.y);
            }

            // Check collision with player
            collidesWithPlayer() {
                return this.collidesWith(this.game.player);
            }
        }

        // Crystal class for collectible items
        class Crystal {
            constructor(game, x, y, color, order) {
                this.game = game; // Reference to game instance
                this.size = 10; // Crystal size matches CSS visual size
                this.x = x; // X position
                this.y = y; // Y position
                this.color = color; // Crystal color (red, green, blue)
                this.order = order; // Collection order within color

                this.element = document.createElement('div');
                this.element.className = `crystal ${this.color}`; // Apply color class
                this.updatePosition(); // Set initial position
                this.game.container.appendChild(this.element); // Add to DOM
            }

            // Update crystal position in DOM
            updatePosition() {
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }

            // Check collision with player
            collidesWithPlayer() {
                return (this.x < this.game.player.x + this.game.player.size &&
                        this.x + this.size > this.game.player.x &&
                        this.y < this.game.player.y + this.game.player.size &&
                        this.y + this.size > this.game.player.y);
            }
        }

        // Explosion class for visual effects
        class Explosion {
            constructor(game, x, y, isPlayer = false) {
                this.game = game; // Reference to game instance
                this.x = x; // Center X of explosion
                this.y = y; // Center Y of explosion
                this.isPlayer = isPlayer; // Flag for player explosion

                this.element = document.createElement('div');
                this.element.className = 'explosion';
                this.element.style.left = `${this.x - 2}px`; // Initial small size
                this.element.style.top = `${this.y - 2}px`;
                this.element.style.width = '4px';
                this.element.style.height = '4px';
                this.element.style.opacity = '1'; // Fully visible
                this.game.container.appendChild(this.element); // Add to DOM
                
                setTimeout(() => { // Expand explosion
                    this.element.style.width = '160px';
                    this.element.style.height = '160px';
                    this.element.style.left = `${this.x - 80}px`; // Center expansion
                    this.element.style.top = `${this.y - 80}px`;
                    if (this.isPlayer) this.game.player.element.style.display = 'none'; // Hide player
                }, 0);
                
                setTimeout(() => this.element.style.opacity = '0', this.isPlayer ? 800 : 600); // Fade out

                this.alive = true; // Explosion state
            }

            // Update explosion state and remove when faded
            update() {
                if (this.element.style.opacity === '0') {
                    setTimeout(() => this.element.remove(), 600); // Remove after fade
                    this.alive = false; // Mark as dead
                }
                return this.alive; // Return alive state
            }
        }

        // Audio manager class for sound effects and music
        class AudioManager {
            constructor() {
                this.backgroundOscillators = []; // Background music oscillators
                this.backgroundGains = []; // Background music gain nodes
                this.backgroundTimers = []; // Timers used by the background rhythm loop
                this.backgroundMusicPlaying = false; // Prevents older rhythm loops from stacking
                this.createAudioContext();
            }

            createAudioContext() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)(); // Audio context

                // Route every sound through one controlled output chain to prevent random volume spikes.
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = 0.75;

                this.limiter = this.ctx.createDynamicsCompressor();
                this.limiter.threshold.value = -18;
                this.limiter.knee.value = 6;
                this.limiter.ratio.value = 12;
                this.limiter.attack.value = 0.003;
                this.limiter.release.value = 0.18;

                this.masterGain.connect(this.limiter);
                this.limiter.connect(this.ctx.destination);
            }

            // Safari can suspend or interrupt audio after page/game restarts.
            // Reopen the graph if needed, then request resume whenever a sound is about to play.
            ensureAudio() {
                if (!this.ctx || this.ctx.state === 'closed') {
                    this.stopBackgroundMusic();
                    this.createAudioContext();
                }

                if (this.ctx && (this.ctx.state === 'suspended' || this.ctx.state === 'interrupted')) {
                    const resumePromise = this.ctx.resume();
                    if (resumePromise && resumePromise.catch) resumePromise.catch(() => {});
                }
            }

            connectOutput(node) {
                node.connect(this.masterGain);
            }

            scheduleBackground(callback, delay) {
                const timer = setTimeout(() => {
                    this.backgroundTimers = this.backgroundTimers.filter(id => id !== timer);
                    if (!this.backgroundMusicPlaying) return;
                    callback();
                }, delay);
                this.backgroundTimers.push(timer);
                return timer;
            }

            pulseGain(gainNode, startValue, endValue, startTime, endTime) {
                try {
                    gainNode.gain.cancelScheduledValues(startTime);
                    gainNode.gain.setValueAtTime(startValue, startTime);
                    gainNode.gain.exponentialRampToValueAtTime(endValue, endTime);
                } catch (e) {
                    // Ignore scheduling attempts on nodes that have already been stopped.
                }
            }

            // Short beep used by the 3-second level countdown.
            playCountdownBeep(isGo = false) {
                this.ensureAudio();
                const oscillator = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                oscillator.connect(gainNode);
                this.connectOutput(gainNode);
                oscillator.type = 'square';
                const now = this.ctx.currentTime;
                oscillator.frequency.setValueAtTime(isGo ? 880 : 660, now);
                gainNode.gain.setValueAtTime(isGo ? 0.12 : 0.09, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + (isGo ? 0.22 : 0.14));
                oscillator.start(now);
                oscillator.stop(now + (isGo ? 0.22 : 0.14));
            }

            // Play level intro music (C major arpeggio)
            playIntro() {
                this.ensureAudio();
                const oscillator = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                oscillator.connect(gainNode);
                this.connectOutput(gainNode);
                oscillator.type = 'square'; // Retro square wave
                const frequencies = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63]; // C4, E4, G4, C5, G4, E4, C4
                frequencies.forEach((freq, i) => {
                    oscillator.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.2); // Sequence notes
                });
                gainNode.gain.setValueAtTime(0.22, this.ctx.currentTime); // Start volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.6); // Fade out
                oscillator.start();
                oscillator.stop(this.ctx.currentTime + 1.6); // Stop after 1.6s
            }

            // Play a quick hidden melody when the level-select cheat unlocks.
            playCheatUnlock() {
                this.ensureAudio();
                const now = this.ctx.currentTime;
                const notes = [880, 1174.66, 1567.98, 2093.00]; // A5, D6, G6, C7

                notes.forEach((freq, i) => {
                    const start = now + i * 0.09;
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.connect(gainNode);
                    this.connectOutput(gainNode);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, start);
                    gainNode.gain.setValueAtTime(0.001, start);
                    gainNode.gain.linearRampToValueAtTime(0.11, start + 0.012);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, start + 0.075);
                    osc.start(start);
                    osc.stop(start + 0.085);
                });
            }

            // Play a quick positive sound when a color group is completed.
            playColorComplete() {
                this.ensureAudio();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99]; // C5, E5, G5

                notes.forEach((freq, i) => {
                    const start = now + i * 0.08;
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.connect(gainNode);
                    this.connectOutput(gainNode);
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, start);
                    gainNode.gain.setValueAtTime(0.001, start);
                    gainNode.gain.linearRampToValueAtTime(0.10, start + 0.012);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, start + 0.12);
                    osc.start(start);
                    osc.stop(start + 0.13);
                });
            }

            // Play bomb detonation sound
            playBomb() {
                this.ensureAudio();
                const osc1 = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                osc2.connect(gainNode);
                this.connectOutput(gainNode);
                osc1.type = 'square'; // Square wave for bass
                osc2.type = 'sine';   // Sine wave for tone
                osc1.frequency.setValueAtTime(600, this.ctx.currentTime); // Start high
                osc2.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.6); // Drop pitch
                osc2.frequency.exponentialRampToValueAtTime(60, this.ctx.currentTime + 0.6);
                gainNode.gain.setValueAtTime(0.22, this.ctx.currentTime); // Start volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.6); // Fade out
                osc1.start();
                osc2.start();
                osc1.stop(this.ctx.currentTime + 0.6); // Stop after 0.6s
                osc2.stop(this.ctx.currentTime + 0.6);
            }

            // Play explosion sound (reuses bomb sound for player)
            playExplosion(isPlayer) {
                if (isPlayer) this.playBomb(); // Player explosion uses bomb sound
            }

            // Play game over sound (descending notes)
            playEnd() {
                this.ensureAudio();
                const osc1 = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                osc2.connect(gainNode);
                this.connectOutput(gainNode);
                osc1.type = 'sawtooth'; // Sawtooth for harshness
                osc2.type = 'sine';     // Sine for harmony
                const frequencies = [349, 294, 261, 220, 196]; // F4, D4, C4, A3, G3
                frequencies.forEach((freq, i) => {
                    osc1.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.4); // Sequence notes
                    osc2.frequency.setValueAtTime(freq * 0.75, this.ctx.currentTime + i * 0.4); // Lower harmony
                });
                gainNode.gain.setValueAtTime(0.22, this.ctx.currentTime); // Start volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 2.0); // Fade out
                osc1.start();
                osc2.start();
                osc1.stop(this.ctx.currentTime + 2.0); // Stop after 2s
                osc2.stop(this.ctx.currentTime + 2.0);
            }

            // Play enemy spawn sound based on size
            playSpawn(size) {
                this.ensureAudio();
                const osc1 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                this.connectOutput(gainNode);
                osc1.type = 'square'; // Square wave for retro feel
                let baseFreq;
                if (size <= 20) {
                    baseFreq = 700;
                } else if (size <= 40) {
                    baseFreq = 500;
                } else {
                    baseFreq = 300;
                } // Higher pitch for smaller enemies
                osc1.frequency.setValueAtTime(baseFreq, this.ctx.currentTime); // Start pitch
                osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, this.ctx.currentTime + 0.3); // Drop pitch
                gainNode.gain.setValueAtTime(0.18, this.ctx.currentTime); // Start volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3); // Fade out
                osc1.start();
                osc1.stop(this.ctx.currentTime + 0.3); // Stop after 0.3s
            }

            // Play crystal collection sound
            playCollect() {
                this.ensureAudio();
                const osc1 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                this.connectOutput(gainNode);
                osc1.type = 'square'; // Square wave for chirp
                osc1.frequency.setValueAtTime(880, this.ctx.currentTime); // High pitch (A5)
                gainNode.gain.setValueAtTime(0.015, this.ctx.currentTime); // Softer crystal pickup volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1); // Quick fade
                osc1.start();
                osc1.stop(this.ctx.currentTime + 0.1); // Stop after 0.1s
            }

            // Start background music with layered oscillators
            startBackgroundMusic() {
                this.ensureAudio();
                if (this.backgroundMusicPlaying) return; // Exit if already playing

                this.stopBackgroundMusic(); // Clear any stale oscillators or timers first.
                this.backgroundMusicPlaying = true;

                const baseFreq = 80; // Base frequency for music

                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'sawtooth'; // Sawtooth for bass
                osc1.frequency.value = baseFreq;
                osc1.connect(gain1);
                this.connectOutput(gain1);
                gain1.gain.value = 0; // Start muted
                this.backgroundOscillators.push(osc1);
                this.backgroundGains.push(gain1);
                osc1.start();

                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle'; // Triangle for mid-tone
                osc2.frequency.value = baseFreq * 1.5;
                osc2.connect(gain2);
                this.connectOutput(gain2);
                gain2.gain.value = 0;
                this.backgroundOscillators.push(osc2);
                this.backgroundGains.push(gain2);
                osc2.start();

                const osc3 = this.ctx.createOscillator();
                const gain3 = this.ctx.createGain();
                osc3.type = 'sine'; // Sine for high tone
                osc3.frequency.value = baseFreq * 2.5;
                osc3.connect(gain3);
                this.connectOutput(gain3);
                gain3.gain.value = 0;
                this.backgroundOscillators.push(osc3);
                this.backgroundGains.push(gain3);
                osc3.start();

                // Recursive function to play rhythmic pattern. Timers are tracked so old level loops cannot stack.
                const playRhythm = () => {
                    if (!this.backgroundMusicPlaying || !this.ctx || this.ctx.state === 'closed') return;
                    const now = this.ctx.currentTime;

                    this.pulseGain(gain1, 0.045, 0.001, now, now + 0.3); // Bass pulse
                    this.scheduleBackground(() => playRhythm(), 800); // Repeat every 800ms

                    this.scheduleBackground(() => { // Mid-tone pulse
                        const pulseTime = this.ctx.currentTime;
                        this.pulseGain(gain2, 0.035, 0.001, pulseTime, pulseTime + 0.3);
                    }, 200);

                    if (Math.random() > 0.5) { // Random high-tone pulse
                        this.scheduleBackground(() => {
                            const pulseTime = this.ctx.currentTime;
                            this.pulseGain(gain3, 0.025, 0.001, pulseTime, pulseTime + 0.2);
                        }, 400);
                    }
                };

                playRhythm(); // Start rhythm
            }

            // Stop background music and clear oscillators/timers
            stopBackgroundMusic() {
                this.backgroundMusicPlaying = false;
                this.backgroundTimers.forEach(timer => clearTimeout(timer));
                this.backgroundTimers = [];

                this.backgroundOscillators.forEach(osc => {
                    try {
                        osc.stop();
                    } catch (e) {
                        // Ignore already-stopped oscillators.
                    }
                }); // Stop all oscillators
                this.backgroundOscillators = [];
                this.backgroundGains = [];
            }

            // Resume audio context after user gestures and after Safari/iOS interruptions.
            resume() {
                this.ensureAudio();
            }
        }

        // UI class for managing interface elements
        class UI {
            constructor(game) {
                this.game = game; // Reference to game instance
                this.scoreElement = document.getElementById('score'); // Score DOM element
                this.bombIndicators = document.getElementById('bombIndicators'); // Bomb indicators container
                this.levelIndicators = document.getElementById('levelIndicators'); // Level indicators container
            }

            // Update score display
            updateScore() {
                this.scoreElement.textContent = `${this.game.score}`;
            }

            // Update bomb indicators based on remaining bombs
            updateBombIndicators() {
                const missiles = this.bombIndicators.children;
                for (let i = 0; i < 3; i++) {
                    missiles[i].style.display = i < this.game.bombsLeft ? 'block' : 'none'; // Show/hide missiles
                }
            }

            // Update level indicators based on current level.
            // Do not reveal the total number of levels; only show progress so far.
            updateLevelIndicators() {
                this.levelIndicators.innerHTML = '';
                for (let i = 0; i < this.game.level; i++) {
                    const circle = document.createElement('div');
                    circle.className = 'level-circle';
                    if (i < this.game.level - 1) circle.classList.add('completed');
                    this.levelIndicators.appendChild(circle);
                }
            }

            // Update all UI elements
            updateAll() {
                this.updateScore();
                this.updateBombIndicators();
                this.updateLevelIndicators();
            }
        }

        // Initialize and start the game
        const game = new Game();
        window.addEventListener('orientationchange', () => setTimeout(() => window.location.reload(), 300));
    </script>
