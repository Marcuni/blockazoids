                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 2.0); // Fade out
                osc1.start();
                osc2.start();
                osc1.stop(this.ctx.currentTime + 2.0); // Stop after 2s
                osc2.stop(this.ctx.currentTime + 2.0);
            }

            // Play enemy spawn sound based on size
            playSpawn(size) {
                const osc1 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                osc1.type = 'square'; // Square wave for retro feel
                const baseFreq = size <= 20 ? 700 : 
                                (size <= 40 ? 500 : 300); // Higher pitch for smaller size
                osc1.frequency.setValueAtTime(baseFreq, this.ctx.currentTime); // Start pitch
                osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, this.ctx.currentTime + 0.3); // Drop pitch
                gainNode.gain.setValueAtTime(0.25, this.ctx.currentTime); // Start volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3); // Fade out
                osc1.start();
                osc1.stop(this.ctx.currentTime + 0.3); // Stop after 0.3s
            }

            // Play crystal collection sound
            playCollect() {
                const osc1 = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                osc1.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                osc1.type = 'square'; // Square wave for chirp
                osc1.frequency.setValueAtTime(880, this.ctx.currentTime); // High pitch (A5)
                gainNode.gain.setValueAtTime(0.025, this.ctx.currentTime); // Soft crystal collection volume
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1); // Quick fade
                osc1.start();
                osc1.stop(this.ctx.currentTime + 0.1); // Stop after 0.1s
            }

            // Start background music with layered oscillators
            startBackgroundMusic() {
                if (this.backgroundOscillators.length > 0) return; // Exit if already playing

                const baseFreq = 80; // Base frequency for music

                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'sawtooth'; // Sawtooth for bass
                osc1.frequency.value = baseFreq;
                osc1.connect(gain1);
                gain1.connect(this.ctx.destination);
                gain1.gain.value = 0; // Start muted
                this.backgroundOscillators.push(osc1);
                this.backgroundGains.push(gain1);
                osc1.start();

                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle'; // Triangle for mid-tone
                osc2.frequency.value = baseFreq * 1.5;
                osc2.connect(gain2);
                gain2.connect(this.ctx.destination);
                gain2.gain.value = 0;
                this.backgroundOscillators.push(osc2);
                this.backgroundGains.push(gain2);
                osc2.start();

                const osc3 = this.ctx.createOscillator();
                const gain3 = this.ctx.createGain();
                osc3.type = 'sine'; // Sine for high tone
                osc3.frequency.value = baseFreq * 2.5;
                osc3.connect(gain3);
                gain3.connect(this.ctx.destination);
                gain3.gain.value = 0;
                this.backgroundOscillators.push(osc3);
                this.backgroundGains.push(gain3);
                osc3.start();

                // Recursive function to play rhythmic pattern
                const playRhythm = () => {
                    if (!this.ctx || this.ctx.state === 'closed') return; // Exit if context closed
                    const now = this.ctx.currentTime;

                    gain1.gain.setValueAtTime(0.05, now); // Bass pulse
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    setTimeout(() => playRhythm(), 800); // Repeat every 800ms

                    setTimeout(() => { // Mid-tone pulse
                        gain2.gain.setValueAtTime(0.04, now + 0.2);
                        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    }, 200);

                    if (Math.random() > 0.5) { // Random high-tone pulse
                        setTimeout(() => {
                            gain3.gain.setValueAtTime(0.03, now + 0.4);
                            gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                        }, 400);
                    }
                };

                playRhythm(); // Start rhythm
            }

            // Stop background music and clear oscillators
            stopBackgroundMusic() {
                this.backgroundOscillators.forEach(osc => osc.stop()); // Stop all oscillators
                this.backgroundOscillators = [];
                this.backgroundGains = [];
            }

            // Resume audio context if suspended
            resume() {
                this.ctx.resume();
            }
        }

        // UI class for managing interface elements
        class UI {
            constructor(game) {
                this.game = game; // Reference to game instance
                this.scoreElement = document.getElementById('score'); // Score DOM element
                this.bombIndicators = document.getElementById('bombIndicators'); // Bomb indicators container
                this.levelIndicators = document.getElementById('levelIndicators'); // Level indicators container
            }

            // Update score display
            updateScore() {
                this.scoreElement.textContent = `${this.game.score}`;
            }

            // Update bomb indicators based on remaining bombs
            updateBombIndicators() {
                const missiles = this.bombIndicators.children;
                for (let i = 0; i < 3; i++) {
                    missiles[i].style.display = i < this.game.bombsLeft ? 'block' : 'none'; // Show/hide missiles
                }
            }

            // Update level indicators based on current level
            updateLevelIndicators() {
                this.levelIndicators.innerHTML = ''; // Clear existing indicators
                for (let i = 0; i < this.game.level; i++) {
                    const circle = document.createElement('div');
                    circle.className = 'level-circle';
                    if (i < this.game.level - 1) circle.classList.add('completed'); // Fill completed levels
                    this.levelIndicators.appendChild(circle);
                }
            }

            // Update all UI elements
            updateAll() {
                this.updateScore();
                this.updateBombIndicators();
                this.updateLevelIndicators();
            }
        }

        // Initialize and start the game
        const game = new Game();
    </script>
</body>
